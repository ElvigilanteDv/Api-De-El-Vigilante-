<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
    <title>API DE EL VIGILANTE · Plan Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg:       #080610;
            --bg-2:     #0f0b1e;
            --bg-3:     #16102a;
            --border:   rgba(120, 80, 255, 0.18);
            --border-h: rgba(155, 77, 255, 0.45);
            --accent:   #9b4dff;
            --accent-2: #c084fc;
            --glow:     rgba(155, 77, 255, 0.35);
            --text:     #ede8f8;
            --muted:    #8b7aaa;
            --success:  #34d399;
            --mono:     'JetBrains Mono', monospace;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }

        /* ── AMBIENT BACKGROUND ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 40% at 20% 10%, rgba(100,40,220,0.12) 0%, transparent 70%),
                radial-gradient(ellipse 50% 35% at 80% 85%, rgba(155,77,255,0.08) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* ── SCROLLBAR ── */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg-2); }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }

        /* ── TOPBAR ── */
        .top-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 62px;
            background: rgba(8, 6, 16, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 1000;
        }

        .top-bar-left { display: flex; align-items: center; gap: 14px; }

        .menu-toggle {
            width: 36px; height: 36px;
            background: none; border: none;
            cursor: pointer;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            gap: 5px; border-radius: 8px;
            transition: background 0.2s;
        }
        .menu-toggle:hover { background: var(--bg-3); }
        .menu-toggle span {
            display: block; width: 20px; height: 2px;
            background: var(--text); transition: all 0.3s ease;
            border-radius: 2px;
        }
        .menu-toggle.active span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
        .menu-toggle.active span:nth-child(2) { opacity: 0; }
        .menu-toggle.active span:nth-child(3) { transform: rotate(-45deg) translate(7px, -6px); }

        .api-name {
            font-size: 18px; font-weight: 700; letter-spacing: -0.3px;
            background: linear-gradient(135deg, #d8c0ff, #9b4dff);
            -webkit-background-clip: text; background-clip: text; color: transparent;
        }

        .pro-badge {
            background: linear-gradient(135deg, #9b4dff, #6d28d9);
            color: white; font-weight: 700; font-size: 10px;
            padding: 3px 10px; border-radius: 20px;
            letter-spacing: 0.5px; text-transform: uppercase;
        }

        .top-bar-right { display: flex; align-items: center; gap: 10px; }

        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
            animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .status-label { font-size: 12px; color: var(--success); font-weight: 600; }

        /* ── SIDEBAR ── */
        .sidebar {
            position: fixed;
            top: 62px; left: -270px;
            width: 260px; height: calc(100vh - 62px);
            background: rgba(10, 7, 20, 0.98);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            transition: left 0.28s cubic-bezier(.4,0,.2,1);
            z-index: 999;
        }
        .sidebar.active { left: 0; }

        .sidebar-overlay {
            position: fixed; top: 62px; left: 0;
            width: 100%; height: calc(100vh - 62px);
            background: rgba(0,0,0,0.6);
            opacity: 0; visibility: hidden;
            transition: all 0.28s ease; z-index: 998;
        }
        .sidebar-overlay.active { opacity: 1; visibility: visible; }

        .sidebar-section-label {
            padding: 20px 20px 6px;
            font-size: 10px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1.5px;
            color: var(--muted);
        }

        .sidebar-item {
            padding: 10px 20px;
            cursor: pointer; transition: all 0.18s ease;
            border-left: 3px solid transparent;
            font-size: 13.5px; font-weight: 500; color: #9a8cba;
            display: flex; align-items: center; gap: 10px;
            border-radius: 0 8px 8px 0; margin: 2px 8px 2px 0;
        }
        .sidebar-item:hover { background: var(--bg-3); color: var(--accent-2); }
        .sidebar-item.active { background: rgba(155,77,255,0.12); border-left-color: var(--accent); color: #c9b0ff; }
        .sidebar-item i { width: 16px; text-align: center; font-size: 13px; }

        /* ── MAIN ── */
        .main-content {
            margin-top: 62px;
            padding: 36px 28px;
            max-width: 1280px;
            margin-left: auto; margin-right: auto;
            position: relative; z-index: 1;
        }

        /* ── HOME BANNER ── */
        .home-banner { text-align: center; animation: fadeUp 0.5s ease; }

        .hero-avatar {
            width: 110px; height: 110px;
            border-radius: 50%;
            border: 2px solid var(--border-h);
            box-shadow: 0 0 40px var(--glow), 0 0 0 8px rgba(155,77,255,0.07);
            margin-bottom: 28px;
            object-fit: cover;
            transition: transform 0.3s;
        }
        .hero-avatar:hover { transform: scale(1.04); }

        .home-title {
            font-size: 48px; font-weight: 700; letter-spacing: -1.5px;
            background: linear-gradient(135deg, #e0d0ff 0%, #9b4dff 60%, #6d28d9 100%);
            -webkit-background-clip: text; background-clip: text; color: transparent;
            line-height: 1.1; margin-bottom: 14px;
        }

        .home-version {
            display: inline-flex; align-items: center; gap: 8px;
            background: var(--bg-3); padding: 6px 20px;
            border-radius: 50px; border: 1px solid var(--border);
            font-size: 13px; color: var(--muted); margin-bottom: 20px;
        }
        .home-version .crown { color: #fbbf24; }

        .home-desc { font-size: 15px; color: var(--muted); max-width: 520px; margin: 0 auto 40px; line-height: 1.65; }

        /* ── STATS ── */
        .stats-grid {
            display: flex; justify-content: center;
            gap: 20px; flex-wrap: wrap; margin-bottom: 20px;
        }

        .stat-card {
            background: var(--bg-2);
            border: 1px solid var(--border);
            border-radius: 20px; padding: 22px 36px;
            text-align: center; min-width: 160px;
            transition: all 0.25s ease; position: relative; overflow: hidden;
        }
        .stat-card::after {
            content: ''; position: absolute;
            inset: 0; border-radius: 20px;
            background: linear-gradient(135deg, rgba(155,77,255,0.06), transparent);
            opacity: 0; transition: opacity 0.25s;
        }
        .stat-card:hover { border-color: var(--border-h); transform: translateY(-4px); box-shadow: 0 16px 40px rgba(155,77,255,0.15); }
        .stat-card:hover::after { opacity: 1; }
        .stat-number { font-size: 38px; font-weight: 800; color: var(--accent); letter-spacing: -1px; }
        .stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }

        /* ── ENDPOINT CARDS ── */
        .page-title {
            font-size: 22px; font-weight: 700;
            color: var(--accent-2);
            display: flex; align-items: center; gap: 10px;
            padding-bottom: 16px; margin-bottom: 28px;
            border-bottom: 1px solid var(--border);
            letter-spacing: -0.3px;
        }

        .endpoints-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }

        .endpoint-card {
            background: var(--bg-2);
            border: 1px solid var(--border);
            border-radius: 18px; padding: 20px 22px;
            display: flex; justify-content: space-between; align-items: center;
            gap: 16px; transition: all 0.22s ease;
        }
        .endpoint-card:hover { border-color: var(--border-h); transform: translateY(-2px); box-shadow: 0 10px 30px rgba(155,77,255,0.12); }

        .endpoint-name { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
        .endpoint-desc { font-size: 12px; color: var(--muted); }

        .endpoint-btn {
            background: linear-gradient(135deg, #9b4dff, #6d28d9);
            color: white; border: none;
            padding: 8px 18px; border-radius: 40px;
            font-size: 12px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
            white-space: nowrap; flex-shrink: 0;
            letter-spacing: 0.2px;
        }
        .endpoint-btn:hover { transform: scale(1.04); box-shadow: 0 0 18px var(--glow); }

        /* ── STATUS PAGE ── */
        .status-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }

        .status-card {
            background: var(--bg-2); border: 1px solid var(--border);
            border-radius: 18px; padding: 22px 24px;
        }
        .status-card-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 10px; }
        .status-card-value { font-size: 18px; font-weight: 700; color: var(--text); }
        .status-card-value.ok { color: var(--success); }
        .status-card-value.purple { color: var(--accent-2); }

        /* ── MODAL ── */
        .modal-content {
            background: var(--bg-2) !important;
            border: 1px solid var(--border) !important;
            border-radius: 24px !important;
            color: var(--text) !important;
        }
        .modal-header {
            border-bottom: 1px solid var(--border) !important;
            padding: 22px 26px !important;
        }
        .modal-title { font-size: 17px; font-weight: 700; color: var(--text); }
        .modal-desc { font-size: 13px; color: var(--muted); margin-top: 4px; }
        .modal-body { padding: 22px 26px !important; }
        .modal-footer { border-top: 1px solid var(--border) !important; padding: 14px 26px !important; }
        .btn-close { filter: invert(1) brightness(0.7); }

        .endpoint-url-box {
            background: var(--bg-3); border: 1px solid var(--border);
            border-radius: 12px; padding: 12px 16px;
            font-family: var(--mono); font-size: 12px;
            color: var(--accent-2); margin-bottom: 20px;
            display: flex; align-items: center; gap: 10px;
            overflow-x: auto;
        }
        .endpoint-url-box i { color: var(--muted); flex-shrink: 0; }

        .response-box {
            background: #07040f;
            border: 1px solid var(--border);
            color: #c4b5fd;
            border-radius: 14px; padding: 18px;
            font-family: var(--mono); font-size: 12.5px;
            white-space: pre-wrap; word-wrap: break-word;
            max-height: 380px; overflow-y: auto; line-height: 1.6;
        }
        .response-box.error { color: #f87171; }

        .submit-btn {
            background: linear-gradient(135deg, #9b4dff, #6d28d9);
            color: white; border: none;
            padding: 10px 26px; border-radius: 40px;
            font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
        }
        .submit-btn:hover { box-shadow: 0 0 20px var(--glow); transform: scale(1.02); }

        /* ── LOADING ── */
        #loadingScreen {
            position: fixed; inset: 0;
            background: var(--bg); z-index: 9999;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            gap: 16px; transition: opacity 0.4s;
        }
        .loader-ring {
            width: 52px; height: 52px;
            border: 3px solid rgba(155,77,255,0.2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-text { font-size: 14px; color: var(--muted); font-weight: 500; }

        /* ── MUSIC PLAYER ── */
        .music-player {
            position: fixed; bottom: 20px; right: 20px;
            width: 270px;
            background: rgba(12, 8, 22, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 22px; padding: 16px 18px;
            z-index: 10000;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7), 0 0 0 1px var(--border);
            transition: width 0.25s, padding 0.25s;
        }
        .music-player.minimized {
            width: 50px; padding: 12px; border-radius: 50%;
            cursor: pointer;
        }
        .music-player.minimized .music-body { display: none; }

        .music-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 12px;
        }
        .music-icon { color: var(--accent); font-size: 14px; }
        .music-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
        .music-min-btn {
            background: none; border: none;
            color: var(--muted); cursor: pointer; font-size: 16px;
            line-height: 1; padding: 2px 6px; border-radius: 6px;
            transition: color 0.2s;
        }
        .music-min-btn:hover { color: var(--text); }

        .music-song { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .music-artist { font-size: 11px; color: var(--muted); margin-bottom: 12px; }

        .progress-track {
            background: rgba(255,255,255,0.08);
            border-radius: 10px; height: 3px;
            cursor: pointer; margin-bottom: 6px;
        }
        .progress-fill {
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
            border-radius: 10px; height: 100%; width: 0%;
            transition: width 0.1s linear;
        }
        .time-row { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); margin-bottom: 12px; }

        .music-controls { display: flex; justify-content: center; align-items: center; gap: 10px; }
        .ctrl-btn {
            background: rgba(155,77,255,0.12); border: none;
            border-radius: 50%; width: 30px; height: 30px;
            cursor: pointer; color: var(--text); font-size: 11px;
            transition: all 0.2s;
        }
        .ctrl-btn:hover { background: rgba(155,77,255,0.25); }
        .ctrl-btn.play {
            background: var(--accent); width: 40px; height: 40px;
            font-size: 13px; box-shadow: 0 4px 16px var(--glow);
        }
        .ctrl-btn.play:hover { background: #b06aff; }

        /* ── ANIMATIONS ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── FOOTER ── */
        .footer {
            text-align: center; padding: 32px 20px;
            border-top: 1px solid var(--border);
            margin-top: 60px;
            font-size: 12px; color: var(--muted);
            position: relative; z-index: 1;
        }
        .footer span { color: var(--accent); }

        /* ── RESPONSIVE ── */
        @media (max-width: 768px) {
            .home-title { font-size: 34px; }
            .stat-card { padding: 18px 24px; min-width: 130px; }
            .main-content { padding: 24px 16px; }
            .music-player { width: 240px; }
        }
    </style>
</head>
<body>

<!-- Loading -->
<div id="loadingScreen">
    <div class="loader-ring"></div>
    <p class="loader-text">Cargando API DE EL VIGILANTE…</p>
</div>

<!-- Music Player -->
<div class="music-player" id="musicPlayer">
    <div class="music-header">
        <div style="display:flex;align-items:center;gap:7px;">
            <i class="fas fa-music music-icon"></i>
            <span class="music-label">Reproduciendo</span>
        </div>
        <button class="music-min-btn" id="toggleMin">−</button>
    </div>
    <div class="music-body">
        <div class="music-song" id="songName">Acento Quinto Real</div>
        <div class="music-artist" id="artistName">Acento Quinto Real</div>
        <div class="progress-track" id="progressTrack">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="time-row">
            <span id="currentTime">0:00</span>
            <span id="duration">0:00</span>
        </div>
        <div class="music-controls">
            <button class="ctrl-btn" id="prevBtn"><i class="fas fa-backward"></i></button>
            <button class="ctrl-btn play" id="playBtn"><i class="fas fa-play"></i></button>
            <button class="ctrl-btn" id="nextBtn"><i class="fas fa-forward"></i></button>
        </div>
    </div>
</div>
<audio id="audioEl"></audio>

<!-- Main Interface -->
<div id="mainInterface" style="display:none;">

    <div class="top-bar">
        <div class="top-bar-left">
            <button class="menu-toggle" id="menuToggle">
                <span></span><span></span><span></span>
            </button>
            <div class="api-name" id="apiName">API DE EL VIGILANTE</div>
            <span class="pro-badge">Pro</span>
        </div>
        <div class="top-bar-right">
            <div class="status-dot"></div>
            <span class="status-label">Online</span>
        </div>
    </div>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-nav">
            <div class="sidebar-section-label">Navegación</div>
            <div class="sidebar-item active" data-page="home"><i class="fas fa-house"></i> Inicio</div>
            <div class="sidebar-item" data-page="status"><i class="fas fa-signal"></i> Estado</div>
            <div class="sidebar-section-label" style="margin-top:10px;">Categorías</div>
            <div id="categoriesNav"></div>
        </div>
    </div>

    <div class="main-content" id="mainContent"></div>

    <div class="footer">
        🛡️ <span>API DE EL VIGILANTE</span> · Plan Pro · Todos los derechos reservados
    </div>
</div>

<!-- Modal -->
<div class="modal fade" id="apiModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <div>
                    <h5 class="modal-title" id="modalTitle"></h5>
                    <p class="modal-desc" id="modalDesc"></p>
                </div>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="endpoint-url-box" id="endpointBox" style="display:none;">
                    <i class="fas fa-link"></i>
                    <code id="endpointUrl"></code>
                </div>
                <div id="paramsContainer"></div>
                <div id="loadingContainer" style="display:none; text-align:center; padding:40px;">
                    <div class="loader-ring"></div>
                </div>
                <div id="responseContainer"></div>
            </div>
            <div class="modal-footer">
                <button class="submit-btn" id="submitBtn" style="display:none;">
                    <i class="fas fa-paper-plane me-2"></i>Enviar
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ── MUSIC PLAYER ──
const playlist = [
    { name: "Acento Quinto Real", artist: "Acento Quinto Real", url: "https://files.catbox.moe/65kqmi.mp3" },
    { name: "Una vaina loca",     artist: "Acento Quinto Real", url: "https://files.catbox.moe/g2zd2z.mp3" }
];
let idx = 0, playing = false, minimized = false;
const audio = document.getElementById('audioEl');
const songNameEl  = document.getElementById('songName');
const artistNameEl= document.getElementById('artistName');
const playBtn     = document.getElementById('playBtn');
const prevBtn     = document.getElementById('prevBtn');
const nextBtn     = document.getElementById('nextBtn');
const fill        = document.getElementById('progressFill');
const track       = document.getElementById('progressTrack');
const curTimeEl   = document.getElementById('currentTime');
const durEl       = document.getElementById('duration');
const toggleMin   = document.getElementById('toggleMin');
const playerEl    = document.getElementById('musicPlayer');

function loadSong(i) {
    const s = playlist[i];
    songNameEl.textContent = s.name;
    artistNameEl.textContent = s.artist;
    audio.src = s.url; audio.load();
    if (playing) audio.play().catch(()=>{});
    updateIcon();
}
function updateIcon() {
    playBtn.querySelector('i').className = playing ? 'fas fa-pause' : 'fas fa-play';
}
function togglePlay() {
    playing ? audio.pause() : audio.play().catch(()=>{});
    playing = !playing; updateIcon();
}
function fmtTime(s) {
    if (isNaN(s)) return '0:00';
    return `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
}
audio.ontimeupdate = () => {
    if (!audio.duration) return;
    fill.style.width = `${(audio.currentTime / audio.duration) * 100}%`;
    curTimeEl.textContent = fmtTime(audio.currentTime);
    durEl.textContent = fmtTime(audio.duration);
};
audio.onended = () => { idx = (idx+1)%playlist.length; loadSong(idx); if(!playing) togglePlay(); };
track.onclick = e => {
    const r = track.getBoundingClientRect();
    audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
};
playBtn.onclick = togglePlay;
nextBtn.onclick = () => { idx=(idx+1)%playlist.length; loadSong(idx); };
prevBtn.onclick = () => { idx=(idx-1+playlist.length)%playlist.length; loadSong(idx); };
toggleMin.onclick = () => {
    minimized = !minimized;
    playerEl.classList.toggle('minimized');
    toggleMin.textContent = minimized ? '+' : '−';
};
playerEl.onclick = e => { if (minimized && e.target === playerEl) { minimized=false; playerEl.classList.remove('minimized'); toggleMin.textContent='−'; } };
loadSong(0);

// ── SETTINGS ──
let settings = {
    name: "API DE EL VIGILANTE",
    version: "v2.0 · Plan Pro",
    description: "API profesional con endpoints creados por El Vigilante.",
    header: { imageSrc: ["https://files.catbox.moe/0tha19.png"] },
    categories: [
        { name: "Usuarios",   items: [{ name: "Perfil", path: "/api/user",   desc: "Obtener perfil de usuario",   innerDesc: "Devuelve datos del perfil del usuario autenticado" }] },
        { name: "Contenido",  items: [{ name: "Feed",   path: "/api/feed",   desc: "Feed dinámico de contenido",  innerDesc: "Obtiene las últimas publicaciones" }] },
        { name: "Seguridad",  items: [{ name: "Estado", path: "/api/status", desc: "Estado del sistema",          innerDesc: "Devuelve información del estado de la API" }] }
    ]
};

async function loadSettings() {
    try { const r = await fetch('/src/settings.json'); if (r.ok) settings = await r.json(); } catch(e) {}
    document.title = settings.name;
    document.getElementById('apiName').textContent = settings.name;
    const nav = document.getElementById('categoriesNav');
    nav.innerHTML = '';
    (settings.categories||[]).forEach(cat => {
        const d = document.createElement('div');
        d.className = 'sidebar-item';
        d.dataset.page = 'category';
        d.dataset.category = cat.name;
        d.innerHTML = `<i class="fas fa-folder"></i> ${cat.name}`;
        nav.appendChild(d);
    });
}

function totalEndpoints() {
    let t = 0; (settings.categories||[]).forEach(c => t += c.items.length); return t;
}

// ── UI ──
function initUI() {
    const toggle  = document.getElementById('menuToggle');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');

    const close = () => { toggle.classList.remove('active'); sidebar.classList.remove('active'); overlay.classList.remove('active'); };
    toggle.onclick = () => { toggle.classList.toggle('active'); sidebar.classList.toggle('active'); overlay.classList.toggle('active'); };
    overlay.onclick = close;

    document.addEventListener('click', e => {
        if (!sidebar.contains(e.target) && !toggle.contains(e.target)) close();
    });

    document.querySelectorAll('.sidebar-item').forEach(item => {
        item.onclick = () => {
            document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
            item.classList.add('active');
            renderPage(item.dataset.page === 'category' ? 'category' : item.dataset.page, item.dataset.category);
            close();
        };
    });
}

function renderPage(page, category = null) {
    const c = document.getElementById('mainContent');
    c.style.animation = 'none';
    c.offsetHeight; // reflow
    c.style.animation = 'fadeUp 0.35s ease';

    if (page === 'home') {
        const img = Array.isArray(settings.header.imageSrc) ? settings.header.imageSrc[0] : 'https://files.catbox.moe/0tha19.png';
        c.innerHTML = `
        <div class="home-banner">
            <img src="${img}" alt="El Vigilante" class="hero-avatar">
            <h1 class="home-title">${settings.name}</h1>
            <div class="home-version">
                <i class="fas fa-crown crown"></i>
                <span>${settings.version}</span>
            </div>
            <p class="home-desc">${settings.description || ''}</p>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number">${totalEndpoints()}</div>
                    <div class="stat-label">Endpoints</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${(settings.categories||[]).length}</div>
                    <div class="stat-label">Categorías</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" style="font-size:30px;">🛡️</div>
                    <div class="stat-label">Plan Pro</div>
                </div>
            </div>
        </div>`;
    }
    else if (page === 'status') {
        c.innerHTML = `
        <h2 class="page-title"><i class="fas fa-signal"></i> Estado del sistema</h2>
        <div class="status-grid">
            <div class="status-card"><div class="status-card-title">API Status</div><div class="status-card-value ok">🟢 Online</div></div>
            <div class="status-card"><div class="status-card-title">Plan activo</div><div class="status-card-value purple">Pro</div></div>
            <div class="status-card"><div class="status-card-title">Versión</div><div class="status-card-value">${settings.version}</div></div>
            <div class="status-card"><div class="status-card-title">Endpoints</div><div class="status-card-value purple">${totalEndpoints()}</div></div>
            <div class="status-card"><div class="status-card-title">Categorías</div><div class="status-card-value">${(settings.categories||[]).length}</div></div>
            <div class="status-card"><div class="status-card-title">Música</div><div class="status-card-value" style="font-size:14px;">🎵 Activa</div></div>
        </div>`;
    }
    else if (page === 'category' && category) {
        const cat = (settings.categories||[]).find(x => x.name === category);
        if (!cat) return;
        c.innerHTML = `
        <h2 class="page-title"><i class="fas fa-folder-open"></i> ${cat.name}</h2>
        <div class="endpoints-grid">
            ${cat.items.map(item => `
            <div class="endpoint-card">
                <div class="endpoint-info">
                    <div class="endpoint-name"><i class="fas fa-code" style="color:var(--accent);margin-right:7px;font-size:12px;"></i>${item.name}</div>
                    <div class="endpoint-desc">${item.desc}</div>
                </div>
                <button class="endpoint-btn" onclick='openEndpoint("${item.path}","${item.name}","${item.desc}","${item.innerDesc}")'>
                    GET <i class="fas fa-arrow-right ms-1" style="font-size:11px;"></i>
                </button>
            </div>`).join('')}
        </div>`;
    }
}

window.openEndpoint = async function(path, name, desc) {
    const modal = new bootstrap.Modal(document.getElementById('apiModal'));
    document.getElementById('modalTitle').textContent = name;
    document.getElementById('modalDesc').textContent = desc;
    document.getElementById('endpointBox').style.display = 'flex';
    document.getElementById('endpointUrl').textContent = window.location.origin + path;
    document.getElementById('paramsContainer').innerHTML = '';
    document.getElementById('responseContainer').innerHTML = '';
    document.getElementById('submitBtn').style.display = 'none';
    document.getElementById('loadingContainer').style.display = 'block';
    modal.show();

    try {
        const r = await fetch(window.location.origin + path);
        const data = await r.json();
        document.getElementById('loadingContainer').style.display = 'none';
        document.getElementById('responseContainer').innerHTML =
            `<pre class="response-box">${JSON.stringify(data, null, 2)}</pre>`;
    } catch(e) {
        document.getElementById('loadingContainer').style.display = 'none';
        document.getElementById('responseContainer').innerHTML =
            `<pre class="response-box error">Error: ${e.message}</pre>`;
    }
};

// ── INIT ──
async function init() {
    await loadSettings();
    initUI();
    renderPage('home');
    const ls = document.getElementById('loadingScreen');
    ls.style.opacity = '0';
    setTimeout(() => ls.style.display = 'none', 420);
    document.getElementById('mainInterface').style.display = 'block';
}

window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
