        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ==================== AUTH ====================
const CODIGO_SECRETO = 'elvigilante';
let modo = 'login';

function renderAuth() {
    const card = document.getElementById('authCard');
    if (modo === 'login') {
        card.innerHTML = `
            <img src="https://files.catbox.moe/0tha19.png" alt="Logo"><h2>Iniciar Sesión</h2>
            <div class="auth-error" id="authError"></div>
            <input type="text" id="authUser" class="inp" placeholder="Usuario o Email">
            <input type="password" id="authPass" class="inp" placeholder="Contraseña">
            <button class="btn btn-primary" onclick="login()">Entrar</button>
            <p class="auth-toggle" onclick="modo='register';renderAuth();">¿No tienes cuenta? Regístrate</p>`;
    } else {
        card.innerHTML = `
            <img src="https://files.catbox.moe/0tha19.png" alt="Logo"><h2>Registro</h2>
            <div class="auth-error" id="authError"></div><div class="auth-ok" id="authOk"></div>
            <input type="text" id="regUser" class="inp" placeholder="Usuario (mín. 3)">
            <input type="email" id="regEmail" class="inp" placeholder="Email">
            <input type="password" id="regPass" class="inp" placeholder="Contraseña (mín. 6)">
            <input type="text" id="regCode" class="inp" placeholder="Código de invitación">
            <button class="btn btn-primary" onclick="register()">Crear cuenta</button>
            <p class="auth-toggle" onclick="modo='login';renderAuth();">¿Ya tienes cuenta? Inicia sesión</p>`;
    }
}

function login() {
    const user = document.getElementById('authUser').value.trim();
    const pass = document.getElementById('authPass').value.trim();
    const errEl = document.getElementById('authError');
    if(!user||!pass){ errEl.textContent='Completa todos los campos';errEl.style.display='block';return; }
    const users = JSON.parse(localStorage.getItem('vigilante_users')||'[]');
    const found = users.find(u=>(u.username===user||u.email===user)&&u.password===pass);
    if(found){ localStorage.setItem('vigilante_session',JSON.stringify(found));entrarAlPanel(); }
    else { errEl.textContent='Usuario o contraseña incorrectos';errEl.style.display='block'; }
}

function register() {
    const user=document.getElementById('regUser').value.trim();
    const email=document.getElementById('regEmail').value.trim();
    const pass=document.getElementById('regPass').value.trim();
    const code=document.getElementById('regCode').value.trim();
    const errEl=document.getElementById('authError');
    const okEl=document.getElementById('authOk');
    errEl.style.display='none';okEl.style.display='none';
    if(!user||!email||!pass||!code){ errEl.textContent='Completa todos los campos';errEl.style.display='block';return; }
    if(user.length<3){ errEl.textContent='Usuario mínimo 3 caracteres';errEl.style.display='block';return; }
    if(!email.includes('@')){ errEl.textContent='Email no válido';errEl.style.display='block';return; }
    if(pass.length<6){ errEl.textContent='Contraseña mínimo 6 caracteres';errEl.style.display='block';return; }
    if(code !== CODIGO_SECRETO){ errEl.textContent='Código de invitación incorrecto';errEl.style.display='block';return; }
    const users = JSON.parse(localStorage.getItem('vigilante_users')||'[]');
    if(users.find(u=>u.username===user)){ errEl.textContent='El usuario ya existe';errEl.style.display='block';return; }
    if(users.find(u=>u.email===email)){ errEl.textContent='El email ya está registrado';errEl.style.display='block';return; }
    const nuevo = { username:user, email, password:pass, fecha:new Date().toISOString() };
    users.push(nuevo);
    localStorage.setItem('vigilante_users',JSON.stringify(users));
    localStorage.setItem('vigilante_session',JSON.stringify(nuevo));
    okEl.textContent='✅ Cuenta creada. Entrando...';okEl.style.display='block';
    setTimeout(entrarAlPanel,800);
}

function entrarAlPanel(){ document.getElementById('authScreen').classList.add('hidden');document.getElementById('appContainer').classList.add('show');start(); }
function cerrarSesion(){ localStorage.removeItem('vigilante_session');document.getElementById('authScreen').classList.remove('hidden');document.getElementById('appContainer').classList.remove('show');renderAuth(); }

// ==================== REPRODUCTOR ====================
const playlist=[{name:"Acento Quinto Real",artist:"Acento Quinto Real",url:"https://files.catbox.moe/65kqmi.mp3"},{name:"Una vaina loca",artist:"Acento Quinto Real",url:"https://files.catbox.moe/g2zd2z.mp3"}];
let currentSongIndex=0,isPlaying=false,isMinimized=false;
const audioEl=document.getElementById('audioPlayer'),playPauseBtn=document.getElementById('playPauseBtn'),prevBtn=document.getElementById('prevBtn'),nextBtn=document.getElementById('nextBtn'),songNameEl=document.getElementById('songName'),artistNameEl=document.getElementById('artistName'),progressBar=document.getElementById('progressBar'),progressContainer=document.getElementById('progressContainer'),currentTimeEl=document.getElementById('currentTime'),durationEl=document.getElementById('duration'),toggleMinimizeBtn=document.getElementById('toggleMinimize'),musicPlayerDiv=document.getElementById('musicPlayer');
function loadSong(i){const s=playlist[i];songNameEl.textContent=s.name;artistNameEl.textContent=s.artist;audioEl.src=s.url;audioEl.load();if(isPlaying)audioEl.play().catch(()=>{});updatePlayIcon();}
function updatePlayIcon(){playPauseBtn.querySelector('i').className=isPlaying?'fas fa-pause':'fas fa-play';}
function playPauseSong(){isPlaying?audioEl.pause():audioEl.play().catch(()=>{});isPlaying=!isPlaying;updatePlayIcon();}
function nextSong(){currentSongIndex=(currentSongIndex+1)%playlist.length;loadSong(currentSongIndex);if(!isPlaying)playPauseSong();}
function prevSong(){currentSongIndex=(currentSongIndex-1+playlist.length)%playlist.length;loadSong(currentSongIndex);if(!isPlaying)playPauseSong();}
function updateProgress(){if(audioEl.duration&&!isNaN(audioEl.duration)){progressBar.style.width=(audioEl.currentTime/audioEl.duration)*100+'%';currentTimeEl.textContent=formatTime(audioEl.currentTime);durationEl.textContent=formatTime(audioEl.duration);}}
function formatTime(s){if(isNaN(s))return"0:00";const m=Math.floor(s/60),seg=Math.floor(s%60);return m+':'+seg.toString().padStart(2,'0');}
function setProgress(e){const r=progressContainer.getBoundingClientRect();audioEl.currentTime=((e.clientX-r.left)/r.width)*audioEl.duration;}
function toggleMinimizePlayer(){isMinimized=!isMinimized;musicPlayerDiv.classList.toggle('minimized');toggleMinimizeBtn.textContent=isMinimized?'+':'−';}
playPauseBtn.onclick=playPauseSong;nextBtn.onclick=nextSong;prevBtn.onclick=prevSong;audioEl.ontimeupdate=updateProgress;audioEl.onended=nextSong;progressContainer.onclick=setProgress;toggleMinimizeBtn.onclick=toggleMinimizePlayer;loadSong(0);

// ==================== API Y DASHBOARD ====================
let settings={name:"API DE EL VIGILANTE",version:"v1.0 · El Vigilante",description:"API profesional con endpoints creados por El Vigilante",header:{imageSrc:["https://files.catbox.moe/0tha19.png"],imageSize:{desktop:"50%"}},apiSettings:{creator:"El Vigilante"},categories:[{name:"Usuarios",items:[{name:"Perfil",path:"/api/user",desc:"Obtener perfil de usuario",innerDesc:"Devuelve datos del perfil del usuario autenticado"}]},{name:"Contenido",items:[{name:"Feed",path:"/api/feed",desc:"Feed dinámico de contenido",innerDesc:"Obtiene las últimas publicaciones"}]},{name:"Búsqueda",items:[{name:"YouTube Search",path:"/search/youtube?q=",desc:"Buscar videos en YouTube",innerDesc:"Ejemplo: Goku Black"}]},{name:"Música",items:[{name:"Canción actual",path:"/api/song",desc:"Obtener información de la canción",innerDesc:"Devuelve los datos de la canción que suena actualmente"}]}]};
async function loadSettings(){try{const r=await fetch('/src/settings.json');if(r.ok)settings=await r.json();}catch(e){}document.title=settings.name;document.getElementById('apiName').innerHTML=settings.name;document.getElementById('footerText').innerHTML='🛡️ '+settings.name+' · Creada por '+(settings.apiSettings?.creator||'El Vigilante')+' · Ac. Acento Quinto Real';const nav=document.getElementById('categoriesNav');if(settings.categories)settings.categories.forEach(c=>{const d=document.createElement('div');d.className='sidebar-item';d.dataset.page='category';d.dataset.category=c.name;d.innerHTML='<i class="fas fa-folder me-2"></i> '+c.name;nav.appendChild(d);});}
function getTotalEndpoints(){let t=0;settings.categories?.forEach(c=>t+=c.items.length);return t;}
function initUI(){const mt=document.getElementById('menuToggle'),sb=document.getElementById('sidebar'),ov=document.getElementById('sidebarOverlay');mt.onclick=()=>{mt.classList.toggle('active');sb.classList.toggle('active');ov.classList.toggle('active');};ov.onclick=()=>{mt.classList.remove('active');sb.classList.remove('active');ov.classList.remove('active');};document.querySelectorAll('.sidebar-item').forEach(i=>{i.onclick=()=>{document.querySelectorAll('.sidebar-item').forEach(x=>x.classList.remove('active'));i.classList.add('active');const p=i.dataset.page,c=i.dataset.category;renderPage(p==='category'?'category':p,c);mt.classList.remove('active');sb.classList.remove('active');ov.classList.remove('active');};});}
function renderPage(page,category=null){const c=document.getElementById('mainContent');if(page==='home'){const img=Array.isArray(settings.header.imageSrc)?settings.header.imageSrc[0]:'https://files.catbox.moe/0tha19.png';c.innerHTML='<div class="home-banner"><img src="'+img+'" alt="API DE EL VIGILANTE"><h1 class="home-title">'+settings.name+'</h1><div class="home-version">'+settings.version+'</div><p class="text-info mb-4">'+settings.description+'</p><div class="stats-grid"><div class="stat-card"><div class="stat-number">'+getTotalEndpoints()+'</div><div class="stat-label">Endpoints</div></div><div class="stat-card"><div class="stat-number">'+(settings.categories?.length||0)+'</div><div class="stat-label">Categorías</div></div><div class="stat-card"><div class="stat-number"><i class="fas fa-music"></i></div><div class="stat-label">Acento Quinto Real</div></div></div><p class="mt-3"><i class="fas fa-headphones text-info"></i> Disfruta de "Una vaina loca" mientras exploras la API</p></div>';}else if(page==='status'){c.innerHTML='<h2 class="category-title"><i class="fas fa-chart-line me-2"></i> Estado del sistema</h2><div class="status-grid"><div class="status-card"><div class="status-card-title">API Status</div><div class="status-card-value" style="color:#6c5ce7;">🟢 Online</div></div><div class="status-card"><div class="status-card-title">Versión</div><div class="status-card-value">'+settings.version+'</div></div><div class="status-card"><div class="status-card-title">Música Activa</div><div class="status-card-value" style="color:#6c5ce7;">🎵 Una vaina loca</div></div><div class="status-card"><div class="status-card-title">Artista</div><div class="status-card-value">Acento Quinto Real</div></div></div>';}else if(page==='category'&&category){const cat=settings.categories.find(x=>x.name===category);if(!cat)return;c.innerHTML='<div class="search-box"><input type="text" class="search-input" placeholder="🔍 Buscar endpoints..." id="searchInput"></div><div class="category-section"><h2 class="category-title"><i class="fas fa-folder-open me-2"></i> '+cat.name+'</h2><div class="endpoints-grid" id="endpointsGrid">'+cat.items.map(item=>'<div class="endpoint-card" data-name="'+item.name.toLowerCase()+'"><div class="endpoint-info"><div class="endpoint-name"><i class="fas fa-code me-2"></i> '+item.name+'</div><div class="endpoint-desc">'+item.desc+'</div></div><button class="endpoint-btn" data-path="'+item.path+'" data-name="'+item.name+'" data-desc="'+item.desc+'" data-inner="'+(item.innerDesc||'')+'">GET <i class="fas fa-arrow-right ms-1"></i></button></div>').join('')+'</div></div>';setupSearch();attachEndpointEvents();}else if(page==='all'){c.innerHTML='<div class="search-box"><input type="text" class="search-input" placeholder="🔍 Buscar endpoints..." id="searchInput"></div><div id="allCategories"></div>';const all=document.getElementById('allCategories');settings.categories?.forEach(cat=>{all.innerHTML+='<div class="category-section" data-category="'+cat.name+'"><h2 class="category-title"><i class="fas fa-cube me-2"></i> '+cat.name+'</h2><div class="endpoints-grid">'+cat.items.map(item=>'<div class="endpoint-card" data-name="'+item.name.toLowerCase()+'"><div class="endpoint-info"><div class="endpoint-name"><i class="fas fa-code me-2"></i> '+item.name+'</div><div class="endpoint-desc">'+item.desc+'</div></div><button class="endpoint-btn" data-path="'+item.path+'" data-name="'+item.name+'" data-desc="'+item.desc+'" data-inner="'+(item.innerDesc||'')+'">GET <i class="fas fa-arrow-right ms-1"></i></button></div>').join('')+'</div></div>';});setupSearch();attachEndpointEvents();}}
function setupSearch(){const inp=document.getElementById('searchInput');if(!inp)return;inp.oninput=(e)=>{const t=e.target.value.toLowerCase();document.querySelectorAll('.endpoint-card').forEach(card=>{card.style.display=card.dataset.name.includes(t)?'':'none';});document.querySelectorAll('.category-section').forEach(sec=>{const vis=sec.querySelectorAll('.endpoint-card:not([style*="display: none"])');sec.style.display=vis.length?'':'none';});};}
function attachEndpointEvents(){document.querySelectorAll('.endpoint-btn').forEach(btn=>{btn.onclick=()=>openModal(btn.dataset.path,btn.dataset.name,btn.dataset.desc,btn.dataset.inner);});}
async function openModal(path,name,desc,innerDesc){const modal=new bootstrap.Modal(document.getElementById('apiModal'));document.getElementById('modalTitle').textContent=name;document.getElementById('modalDesc').textContent=desc;const parts=path.split('?');const basePath=parts[0];const existingParams=new URLSearchParams(parts[1]||'');const baseUrl=window.location.origin+basePath;document.getElementById('endpointBox').style.display='block';document.getElementById('endpointBox').innerHTML='<code>'+baseUrl+'</code>';const liveUrlBox=document.getElementById('liveUrlBox');const liveUrlText=document.getElementById('liveUrlText');liveUrlBox.style.display='block';document.getElementById('paramsContainer').innerHTML='';document.getElementById('responseContainer').innerHTML='';document.getElementById('submitBtn').style.display='none';document.getElementById('loadingContainer').style.display='none';const hasParams=existingParams.keys().next().done===false;function updateLiveUrl(){const params=new URLSearchParams();document.querySelectorAll('#paramsContainer .param-input').forEach(inp=>{if(inp.value.trim())params.append(inp.dataset.param,inp.value.trim());});let final=baseUrl;const ps=params.toString();if(ps)final+='?'+ps;else if(hasParams&&document.querySelectorAll('#paramsContainer .param-input').length===0)final+='?'+existingParams.toString();liveUrlText.textContent=final;}if(hasParams){const pc=document.getElementById('paramsContainer');for(let[k,v]of existingParams){const inp=document.createElement('input');inp.type='text';inp.className='param-input';inp.placeholder=k+' (ej: '+(v||'valor')+')...';inp.dataset.param=k;pc.appendChild(inp);}if(innerDesc)pc.innerHTML+='<div class="inner-desc text-info small mt-2 mb-2"><i class="fas fa-info-circle me-1"></i> '+innerDesc+'</div>';const sb=document.getElementById('submitBtn');sb.style.display='block';pc.querySelectorAll('.param-input').forEach(i=>i.addEventListener('input',updateLiveUrl));updateLiveUrl();sb.onclick=async()=>{const params=new URLSearchParams();document.querySelectorAll('#paramsContainer .param-input').forEach(inp=>{if(inp.value.trim())params.append(inp.dataset.param,inp.value.trim());});let finalUrl=baseUrl;const pstr=params.toString();if(pstr)finalUrl+='?'+pstr;document.getElementById('loadingContainer').style.display='block';document.getElementById('responseContainer').innerHTML='';try{const resp=await fetch(finalUrl);const ct=resp.headers.get('Content-Type');if(ct&&ct.startsWith('image/')){const blob=await resp.blob();const img=document.createElement('img');img.src=URL.createObjectURL(blob);img.className='response-image w-100 mt-2 rounded';document.getElementById('responseContainer').appendChild(img);}else{const data=await resp.json();document.getElementById('responseContainer').innerHTML='<pre class="response-box">'+JSON.stringify(data,null,2)+'</pre>';}}catch(e){document.getElementById('responseContainer').innerHTML='<pre class="response-box text-danger">Error: '+e.message+'</pre>';}document.getElementById('loadingContainer').style.display='none';};}else{liveUrlText.textContent=baseUrl;document.getElementById('loadingContainer').style.display='block';try{const resp=await fetch(baseUrl);const ct=resp.headers.get('Content-Type');if(ct&&ct.startsWith('image/')){const blob=await resp.blob();const img=document.createElement('img');img.src=URL.createObjectURL(blob);img.className='response-image w-100 mt-2 rounded';document.getElementById('responseContainer').appendChild(img);}else{const data=await resp.json();document.getElementById('responseContainer').innerHTML='<pre class="response-box">'+JSON.stringify(data,null,2)+'</pre>';}}catch(e){document.getElementById('responseContainer').innerHTML='<pre class="response-box text-danger">Error: '+e.message+'</pre>';}document.getElementById('loadingContainer').style.display='none';}modal.show();}
async function start(){await loadSettings();initUI();renderPage('home');document.getElementById('loadingScreen').style.display='none';}
