<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
    <title>API DE EL VIGILANTE · Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #08060e;
            color: #e0d7f0;
            overflow-x: hidden;
        }
        
        :root {
            --bg: #08060e;
            --card: rgba(18, 14, 28, 0.9);
            --border: #2d1f4a;
            --accent: #9b4dff;
            --text: #e0d7f0;
            --muted: #988ab3;
        }
        
        #loadingScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 99999;
            display: flex; justify-content: center; align-items: center; flex-direction: column;
            transition: opacity 0.5s;
        }
        
        .spinner {
            width: 50px; height: 50px;
            border: 3px solid rgba(155,77,255,0.2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* ========== LOGIN/REGISTER ========== */
        #authScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1030 50%, #0d0a1a 100%);
            z-index: 10001;
            display: flex; justify-content: center; align-items: center;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(155,77,255,0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(100,50,200,0.08) 0%, transparent 50%);
        }
        
        .auth-container { width: 100%; max-width: 440px; padding: 20px; }
        
        .auth-card {
            background: rgba(20, 15, 35, 0.95);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 45px 40px;
            text-align: center;
            box-shadow: 0 30px 80px rgba(0,0,0,0.7), 0 0 60px rgba(155,77,255,0.1);
        }
        
        .auth-logo-container { position: relative; display: inline-block; margin-bottom: 25px; }
        
        .auth-logo {
            width: 100px; height: 100px; border-radius: 50%;
            border: 3px solid var(--accent);
            box-shadow: 0 0 40px rgba(155,77,255,0.5), 0 0 80px rgba(155,77,255,0.2);
            object-fit: cover;
        }
        
        .auth-logo-glow {
            position: absolute; inset: -15px; border-radius: 50%;
            background: radial-gradient(circle, rgba(155,77,255,0.3) 0%, transparent 70%);
            pointer-events: none;
        }
        
        .auth-title {
            font-size: 28px; font-weight: 900;
            background: linear-gradient(135deg, #d9c5ff, #9b4dff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 6px; letter-spacing: -0.5px;
        }
        
        .auth-subtitle { font-size: 14px; color: var(--muted); margin-bottom: 30px; letter-spacing: 0.5px; }
        
        .auth-input-group { position: relative; margin-bottom: 18px; }
        
        .auth-input-group i {
            position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
            color: #6b5b85; font-size: 16px; transition: 0.3s;
        }
        
        .auth-input {
            width: 100%; padding: 14px 16px 14px 45px;
            background: rgba(0,0,0,0.4); border: 1.5px solid var(--border);
            color: var(--text); border-radius: 14px; font-size: 15px;
            outline: none; transition: all 0.3s; font-family: 'Inter', sans-serif;
        }
        
        .auth-input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(155,77,255,0.1); }
        .auth-input-group:focus-within i { color: var(--accent); }
        .auth-input::placeholder { color: #5a4d6e; }
        
        .btn-auth {
            width: 100%; padding: 15px;
            background: linear-gradient(135deg, #9b4dff, #6a1b9a);
            color: white; border: none; border-radius: 14px;
            font-weight: 700; font-size: 16px; cursor: pointer; transition: all 0.3s;
            margin-top: 8px; letter-spacing: 0.5px;
            box-shadow: 0 8px 25px rgba(155,77,255,0.3);
        }
        
        .btn-auth:hover {
            background: linear-gradient(135deg, #b87aff, #8a2be2);
            transform: translateY(-2px); box-shadow: 0 12px 35px rgba(155,77,255,0.5);
        }
        
        .auth-divider {
            display: flex; align-items: center; gap: 15px;
            margin: 22px 0; color: #5a4d6e; font-size: 13px;
        }
        
        .auth-divider::before, .auth-divider::after {
            content: ''; flex: 1; height: 1px;
            background: linear-gradient(90deg, transparent, var(--border), transparent);
        }
        
        .auth-link {
            color: var(--accent); cursor: pointer; font-weight: 600;
            font-size: 14px; transition: 0.3s; text-decoration: none;
        }
        
        .auth-link:hover { color: #c9b0ff; text-decoration: underline; }
        
        .pro-badge-auth {
            display: inline-block;
            background: linear-gradient(135deg, #9b4dff, #6a1b9a);
            color: white; font-weight: 700; font-size: 11px;
            padding: 6px 16px; border-radius: 20px; margin-top: 8px;
            letter-spacing: 1px; box-shadow: 0 0 20px rgba(155,77,255,0.4);
        }
        
        /* ========== TOP BAR ========== */
        .top-bar {
            position: fixed; top: 0; left: 0; right: 0; height: 68px;
            background: rgba(18, 14, 28, 0.95); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 28px; z-index: 1000;
        }
        
        .top-bar-left { display: flex; align-items: center; gap: 18px; }
        
        .menu-toggle {
            width: 40px; height: 40px; background: none; border: none;
            cursor: pointer; display: flex; flex-direction: column;
            justify-content: center; align-items: center; gap: 5px;
            border-radius: 10px; transition: 0.2s;
        }
        
        .menu-toggle:hover { background: rgba(155,77,255,0.1); }
        
        .menu-toggle span {
            display: block; width: 22px; height: 2px;
            background: var(--text); transition: 0.3s; border-radius: 2px;
        }
        
        .api-name {
            font-size: 22px; font-weight: 800;
            background: linear-gradient(135deg, #c9b0ff, #9b4dff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        
        .pro-badge {
            background: linear-gradient(135deg, #9b4dff, #6a1b9a);
            color: white; font-weight: 700; font-size: 10px;
            padding: 5px 12px; border-radius: 20px;
            box-shadow: 0 0 15px rgba(155,77,255,0.3);
        }
        
        .user-section { display: flex; align-items: center; gap: 12px; }
        
        .btn-logout {
            background: rgba(155,77,255,0.1); border: 1px solid var(--border);
            color: var(--muted); padding: 8px 16px; border-radius: 25px;
            cursor: pointer; font-size: 13px; transition: 0.2s;
            display: flex; align-items: center; gap: 6px;
        }
        
        .btn-logout:hover { background: rgba(155,77,255,0.2); color: var(--text); }
        
        /* ========== SIDEBAR ========== */
        .sidebar {
            position: fixed; top: 68px; left: -290px; width: 290px;
            height: calc(100vh - 68px); background: rgba(18, 14, 28, 0.98);
            backdrop-filter: blur(20px); border-right: 1px solid var(--border);
            overflow-y: auto; transition: left 0.3s; z-index: 999;
        }
        
        .sidebar.active { left: 0; }
        
        .sidebar-overlay {
            position: fixed; top: 68px; left: 0; width: 100%;
            height: calc(100vh - 68px); background: rgba(0,0,0,0.7);
            opacity: 0; visibility: hidden; transition: 0.3s; z-index: 998;
        }
        
        .sidebar-overlay.active { opacity: 1; visibility: visible; }
        
        .sidebar-nav { padding: 20px 0; }
        
        .sidebar-item {
            padding: 13px 24px; cursor: pointer;
            border-left: 3px solid transparent;
            font-size: 14px; font-weight: 500; color: var(--muted);
            display: flex; align-items: center; gap: 12px;
            margin: 2px 12px; border-radius: 10px; transition: 0.2s;
        }
        
        .sidebar-item:hover { background: rgba(155,77,255,0.1); color: #c9b0ff; }
        .sidebar-item.active { background: rgba(155,77,255,0.15); border-left-color: var(--accent); color: #c9b0ff; }
        
        .sidebar-category {
            padding: 24px 24px 10px; font-size: 10px; font-weight: 700;
            color: #6b5b85; text-transform: uppercase; letter-spacing: 1.5px;
        }
        
        /* ========== MAIN CONTENT ========== */
        .main-content {
            margin-top: 90px; padding: 30px 32px;
            max-width: 1350px; margin-left: auto; margin-right: auto;
            min-height: calc(100vh - 120px);
        }
        
        .hero-section { text-align: center; margin-bottom: 55px; }
        
        .hero-image {
            width: 170px; height: 170px; border-radius: 50%;
            border: 3px solid var(--accent);
            box-shadow: 0 0 50px rgba(155,77,255,0.4); margin-bottom: 35px;
        }
        
        .hero-title {
            font-size: 52px; font-weight: 900;
            background: linear-gradient(135deg, #d9c5ff, #9b4dff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 10px; letter-spacing: -1px;
        }
        
        .hero-subtitle { font-size: 16px; color: var(--muted); margin-bottom: 18px; }
        
        .hero-version {
            display: inline-flex; align-items: center; gap: 10px;
            background: rgba(155,77,255,0.15); border: 1px solid var(--border);
            color: #c9b0ff; padding: 10px 24px; border-radius: 50px;
            font-size: 14px; font-weight: 600;
        }
        
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 24px; margin: 45px 0;
        }
        
        .stat-card {
            background: var(--card); border-radius: 24px; padding: 30px 26px;
            text-align: center; border: 1px solid var(--border); transition: 0.3s;
        }
        
        .stat-card:hover { transform: translateY(-8px); border-color: var(--accent); }
        
        .stat-icon { font-size: 32px; margin-bottom: 14px; color: var(--accent); }
        .stat-number { font-size: 44px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
        .stat-label { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
        
        .page-header { margin-bottom: 35px; }
        .page-title { font-size: 30px; font-weight: 800; color: var(--text); margin-bottom: 8px; }
        .page-subtitle { font-size: 15px; color: var(--muted); }
        
        .search-input {
            width: 100%; padding: 16px 22px; border: 1.5px solid var(--border);
            border-radius: 18px; font-size: 15px; background: rgba(18,14,28,0.7);
            color: var(--text); margin-bottom: 28px; outline: none;
        }
        
        .search-input:focus { border-color: var(--accent); }
        
        .endpoints-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 20px; margin-top: 20px;
        }
        
        .endpoint-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 20px; padding: 24px; transition: 0.3s;
        }
        
        .endpoint-card:hover { border-color: var(--accent); transform: translateY(-3px); }
        
        .endpoint-method {
            font-size: 11px; font-weight: 700; color: #10b981;
            background: rgba(16,185,129,0.1); padding: 4px 10px;
            border-radius: 8px; display: inline-block; margin-bottom: 10px;
        }
        
        .endpoint-name { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
        .endpoint-path {
            font-size: 13px; color: var(--accent); font-family: monospace;
            background: rgba(0,0,0,0.3); padding: 6px 10px; border-radius: 8px;
            word-break: break-all; margin-bottom: 10px;
        }
        .endpoint-desc { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
        
        .endpoint-actions { display: flex; gap: 10px; }
        
        .btn-probar {
            background: rgba(155,77,255,0.15); border: 1px solid rgba(155,77,255,0.3);
            color: #c9b0ff; padding: 10px 20px; border-radius: 30px;
            font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; gap: 8px; flex: 1;
            justify-content: center;
        }
        
        .btn-probar:hover {
            background: rgba(155,77,255,0.3); border-color: var(--accent);
            box-shadow: 0 0 20px rgba(155,77,255,0.3);
        }
        
        .btn-copiar {
            background: rgba(155,77,255,0.08); border: 1px solid rgba(155,77,255,0.2);
            color: #988ab3; padding: 10px 14px; border-radius: 30px;
            font-size: 13px; cursor: pointer; transition: 0.2s;
        }
        
        .btn-copiar:hover { background: rgba(155,77,255,0.2); color: #c9b0ff; }
        
        .footer {
            text-align: center; padding: 30px; border-top: 1px solid var(--border);
            margin-top: 60px; font-size: 13px; color: #6b5b85;
        }
        
        /* ========== MODAL PROBADOR ========== */
        .modal-content {
            background: #120e1c; color: var(--text);
            border: 1.5px solid var(--border); border-radius: 24px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.9);
        }
        
        .modal-header { border-bottom: 1px solid var(--border); padding: 22px 28px; }
        .modal-body { padding: 28px; }
        .modal-footer { border-top: 1px solid var(--border); padding: 18px 28px; }
        
        .modal-header .btn-close {
            filter: invert(1); opacity: 0.7; transition: 0.2s;
            width: 32px; height: 32px; border-radius: 50%;
            background: rgba(255,255,255,0.1);
        }
        
        .modal-header .btn-close:hover { opacity: 1; background: rgba(255,255,255,0.2); }
        
        .endpoint-url-box {
            background: rgba(0,0,0,0.4); padding: 16px; border-radius: 14px;
            font-family: monospace; font-size: 14px; color: #c9b0ff;
            margin-bottom: 22px; border: 1px solid var(--border);
            word-break: break-all; display: flex; align-items: center; gap: 12px;
        }
        
        .endpoint-url-box code { flex: 1; }
        
        .btn-copy-url {
            background: rgba(155,77,255,0.2); border: none; color: var(--accent);
            padding: 8px 12px; border-radius: 10px; cursor: pointer; transition: 0.2s;
            flex-shrink: 0;
        }
        
        .btn-copy-url:hover { background: rgba(155,77,255,0.4); }
        
        .param-label {
            font-size: 12px; color: var(--muted); margin-bottom: 6px;
            font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
        }
        
        .param-input {
            width: 100%; padding: 13px 16px; border: 1.5px solid var(--border);
            border-radius: 12px; font-size: 14px; margin-bottom: 16px;
            background: rgba(0,0,0,0.4); color: var(--text); outline: none;
            font-family: 'Inter', sans-serif; transition: all 0.3s;
        }
        
        .param-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(155,77,255,0.1); }
        
        .response-box {
            background: rgba(0,0,0,0.5); border: 1px solid var(--border);
            color: #c9b0ff; border-radius: 14px; padding: 18px;
            font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px;
            white-space: pre-wrap; max-height: 450px; overflow-y: auto;
            margin-top: 22px; line-height: 1.6;
        }

        .response-box.error { color: #ef4444; border-color: rgba(239,68,68,0.3); }
        .response-box.success { border-color: rgba(16,185,129,0.3); }
        
        .response-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-top: 22px; margin-bottom: 0;
        }
        
        .response-status {
            font-size: 12px; padding: 4px 12px; border-radius: 20px;
            font-weight: 700; letter-spacing: 0.5px;
        }
        
        .status-ok { background: rgba(16,185,129,0.15); color: #10b981; }
        .status-err { background: rgba(239,68,68,0.15); color: #ef4444; }
        
        .btn-copy-response {
            background: rgba(155,77,255,0.1); border: 1px solid rgba(155,77,255,0.2);
            color: var(--muted); padding: 4px 12px; border-radius: 20px;
            font-size: 12px; cursor: pointer; transition: 0.2s;
        }
        
        .btn-copy-response:hover { background: rgba(155,77,255,0.2); color: #c9b0ff; }

        .inner-desc-box {
            background: rgba(155,77,255,0.05); border: 1px solid rgba(155,77,255,0.15);
            border-radius: 12px; padding: 12px 16px; margin-bottom: 18px;
            color: #988ab3; font-size: 13px;
        }
        
        .btn-send {
            background: linear-gradient(135deg, #9b4dff, #6a1b9a);
            color: white; border: none; padding: 12px 28px; border-radius: 30px;
            font-weight: 700; font-size: 14px; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; gap: 8px;
            box-shadow: 0 6px 20px rgba(155,77,255,0.3);
        }
        
        .btn-send:hover {
            background: linear-gradient(135deg, #b87aff, #8a2be2);
            box-shadow: 0 8px 30px rgba(155,77,255,0.5);
        }

        .btn-send:disabled {
            opacity: 0.6; cursor: not-allowed; transform: none;
        }
        
        .loading-inline {
            display: flex; align-items: center; gap: 12px;
            color: #988ab3; font-size: 14px; padding: 20px 0;
        }
        
        .spinner-sm {
            width: 24px; height: 24px;
            border: 2px solid rgba(155,77,255,0.2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            flex-shrink: 0;
        }
        
        .status-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px; margin-top: 35px;
        }
        
        .status-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 20px; padding: 30px; transition: 0.3s;
        }
        
        .status-card:hover { border-color: var(--accent); transform: translateY(-5px); }
        
        .status-indicator {
            width: 14px; height: 14px; background: #10b981; border-radius: 50%;
            display: inline-block; margin-right: 10px;
            box-shadow: 0 0 15px rgba(16,185,129,0.6);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 15px rgba(16,185,129,0.6); }
            50% { box-shadow: 0 0 30px rgba(16,185,129,1); }
        }
        
        .status-card-title {
            font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px;
            color: #6b5b85; margin-bottom: 14px; font-weight: 600;
        }
        
        .status-card-value { font-size: 26px; font-weight: 700; color: var(--text); }
        .status-card-icon { font-size: 36px; color: var(--accent); margin-bottom: 14px; }
        
        /* ========== MUSIC PLAYER ========== */
        .music-player {
            position: fixed; bottom: 24px; right: 24px; width: 310px;
            background: var(--card); border-radius: 22px; padding: 18px;
            z-index: 9999; border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.7); transition: all 0.3s;
        }
        
        .music-player.minimized { width: 55px; padding: 12px; border-radius: 50px; overflow: hidden; }
        .music-player.minimized .music-info,
        .music-player.minimized .music-controls,
        .music-player.minimized .progress-container,
        .music-player.minimized .time-info,
        .music-player.minimized .music-title { display: none; }
        
        .music-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .music-title { font-size: 12px; opacity: 0.7; }
        .music-info { text-align: center; margin-bottom: 12px; }
        .song-name { font-size: 15px; font-weight: 600; color: var(--text); }
        .artist-name { color: var(--accent); font-size: 12px; }
        
        .progress-container {
            background: rgba(255,255,255,0.08); border-radius: 10px;
            height: 5px; margin: 12px 0; cursor: pointer;
        }
        
        .progress-bar {
            background: linear-gradient(135deg, #9b4dff, #6a1b9a);
            border-radius: 10px; height: 100%; width: 0%; transition: width 0.1s;
        }
        
        .time-info { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); }
        .music-controls { display: flex; justify-content: center; gap: 16px; margin-top: 8px; }
        
        .control-btn {
            background: rgba(155,77,255,0.15); border: none; border-radius: 50%;
            width: 36px; height: 36px; cursor: pointer; color: var(--text);
            font-size: 14px; display: flex; align-items: center; justify-content: center;
            transition: 0.2s;
        }
        
        .control-btn:hover { background: rgba(155,77,255,0.3); }
        
        .control-btn.play-btn {
            background: linear-gradient(135deg, #9b4dff, #6a1b9a);
            width: 48px; height: 48px; font-size: 18px;
        }
        
        @media (max-width: 768px) {
            .hero-title { font-size: 36px; }
            .main-content { padding: 20px 16px; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .endpoints-grid { grid-template-columns: 1fr; }
            .auth-card { padding: 30px 25px; }
            .music-player { bottom: 12px; right: 12px; width: 280px; }
        }
    </style>
</head>
<body>
    <div id="loadingScreen">
        <div class="spinner"></div>
        <p style="margin-top: 18px; color: #988ab3; font-size: 15px;">Cargando API DE EL VIGILANTE</p>
    </div>

    <div id="authScreen">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-logo-container">
                    <div class="auth-logo-glow"></div>
                    <img src="https://files.catbox.moe/0tha19.png" alt="Logo" class="auth-logo">
                </div>
                <div class="auth-title">EL VIGILANTE</div>
                <div class="auth-subtitle">API Profesional · Acceso Exclusivo</div>
                <span class="pro-badge-auth">PLAN PRO</span>
                <div id="authFormContainer" style="margin-top: 25px;"></div>
            </div>
        </div>
    </div>

    <!-- MUSIC PLAYER -->
    <div class="music-player" id="musicPlayer">
        <div class="music-header">
            <span class="music-title">🎵 ACENTO · QUINTO REAL</span>
            <button id="toggleMinimize" style="background:none;border:none;color:#e0d7f0;cursor:pointer;font-size:18px;line-height:1;">−</button>
        </div>
        <div class="music-info">
            <div class="song-name" id="songName">Una vaina loca</div>
            <div class="artist-name" id="artistName">Acento Quinto Real</div>
        </div>
        <div class="progress-container" id="progressContainer">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="time-info">
            <span id="currentTime">0:00</span>
            <span id="duration">0:00</span>
        </div>
        <div class="music-controls">
            <button class="control-btn" id="prevBtn"><i class="fas fa-backward"></i></button>
            <button class="control-btn play-btn" id="playPauseBtn"><i class="fas fa-play"></i></button>
            <button class="control-btn" id="nextBtn"><i class="fas fa-forward"></i></button>
        </div>
    </div>
    <audio id="audioPlayer"></audio>

    <div class="top-bar" id="topBar" style="display: none;">
        <div class="top-bar-left">
            <button class="menu-toggle" id="menuToggle"><span></span><span></span><span></span></button>
            <div class="api-name" id="apiName">EL VIGILANTE</div>
            <span class="pro-badge">PRO</span>
        </div>
        <div class="user-section" id="userSection"></div>
    </div>

    <div class="sidebar-overlay" id="sidebarOverlay" style="display: none;"></div>
    <div class="sidebar" id="sidebar" style="display: none;">
        <div class="sidebar-nav">
            <div class="sidebar-item active" data-page="home"><i class="fas fa-home"></i> Dashboard</div>
            <div class="sidebar-item" data-page="status"><i class="fas fa-chart-line"></i> Estado</div>
            <div class="sidebar-category"><i class="fas fa-tag me-2"></i> Categorías</div>
            <div id="categoriesNav"></div>
            <div class="sidebar-item" data-page="all"><i class="fas fa-cubes"></i> Todos los endpoints</div>
        </div>
    </div>

    <div class="main-content" id="mainContent" style="display: none;"></div>

    <div class="footer" id="footer" style="display: none;">
        <p id="footerText">🛡️ API DE EL VIGILANTE · Plan Pro · Música: Acento Quinto Real</p>
    </div>

    <!-- MODAL PROBADOR DE ENDPOINTS — corregido -->
    <div class="modal fade" id="apiModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <div>
                        <h5 class="modal-title" id="modalTitle" style="font-weight:700; font-size:18px;"></h5>
                        <p id="modalDesc" style="font-size:13px;color:#988ab3;margin:4px 0 0;"></p>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body">
                    <!-- URL del endpoint -->
                    <div class="endpoint-url-box" id="endpointUrlBox">
                        <code id="endpointUrlCode" style="word-break:break-all;"></code>
                        <button class="btn-copy-url" id="btnCopyUrl" title="Copiar URL">
                            <i class="fas fa-copy"></i>
                        </button>
                    </div>
                    <!-- Parámetros dinámicos -->
                    <div id="paramsContainer"></div>
                    <!-- Estado / respuesta -->
                    <div id="modalStatus"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn" data-bs-dismiss="modal"
                        style="border-radius:30px;background:rgba(255,255,255,0.07);border:1px solid var(--border);color:var(--text);padding:10px 22px;">
                        <i class="fas fa-times me-2"></i>Cerrar
                    </button>
                    <button class="btn-send" id="submitBtn">
                        <i class="fas fa-paper-plane"></i> Enviar petición
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    // ============================================================
    //  REPRODUCTOR
    // ============================================================
    const playlist = [
        { name: "Acento Quinto Real", artist: "Acento Quinto Real", url: "https://files.catbox.moe/65kqmi.mp3" },
        { name: "Una vaina loca",     artist: "Acento Quinto Real", url: "https://files.catbox.moe/g2zd2z.mp3" }
    ];
    let cs = 0, playing = false, minimized = false;
    const audio = document.getElementById('audioPlayer');

    function loadSong(i) {
        const s = playlist[i];
        document.getElementById('songName').textContent   = s.name;
        document.getElementById('artistName').textContent = s.artist;
        audio.src = s.url; audio.load();
        if (playing) audio.play().catch(() => {});
        document.getElementById('playPauseBtn').querySelector('i').className = playing ? 'fas fa-pause' : 'fas fa-play';
    }

    document.getElementById('playPauseBtn').onclick = () => {
        playing ? audio.pause() : audio.play().catch(() => {});
        playing = !playing;
        document.getElementById('playPauseBtn').querySelector('i').className = playing ? 'fas fa-pause' : 'fas fa-play';
    };

    document.getElementById('nextBtn').onclick = () => {
        cs = (cs + 1) % playlist.length; loadSong(cs);
        if (!playing) { playing = true; audio.play().catch(() => {}); document.getElementById('playPauseBtn').querySelector('i').className = 'fas fa-pause'; }
    };
    document.getElementById('prevBtn').onclick = () => {
        cs = (cs - 1 + playlist.length) % playlist.length; loadSong(cs);
        if (!playing) { playing = true; audio.play().catch(() => {}); document.getElementById('playPauseBtn').querySelector('i').className = 'fas fa-pause'; }
    };

    audio.ontimeupdate = () => {
        if (audio.duration) {
            document.getElementById('progressBar').style.width = (audio.currentTime / audio.duration) * 100 + '%';
            document.getElementById('currentTime').textContent = fmt(audio.currentTime);
            document.getElementById('duration').textContent    = fmt(audio.duration);
        }
    };
    audio.onended = () => { cs = (cs + 1) % playlist.length; loadSong(cs); };

    document.getElementById('progressContainer').onclick = e => {
        const rect = e.currentTarget.getBoundingClientRect();
        audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
    };

    document.getElementById('toggleMinimize').onclick = () => {
        minimized = !minimized;
        document.getElementById('musicPlayer').classList.toggle('minimized', minimized);
        document.getElementById('toggleMinimize').textContent = minimized ? '+' : '−';
    };

    function fmt(s) { return `${Math.floor(s / 60)}:${String(Math.floor(s % 60)).padStart(2, '0')}`; }
    loadSong(0);

    // ============================================================
    //  AUTENTICACIÓN
    // ============================================================
    const CODE = "elvigilante";
    const getUsers   = () => JSON.parse(localStorage.getItem('vu')  || '[]');
    const saveUsers  = u  => localStorage.setItem('vu', JSON.stringify(u));
    const getCurrent = () => JSON.parse(localStorage.getItem('vcu') || 'null');
    const setCurrent = u  => localStorage.setItem('vcu', JSON.stringify(u));

    function showApp() {
        document.getElementById('authScreen').style.display = 'none';
        ['topBar','sidebar','mainContent','footer','sidebarOverlay'].forEach(id => {
            document.getElementById(id).style.display = '';
        });
        updateUserUI();
        renderPage('home');
    }

    function showAuth(view = 'login') {
        document.getElementById('authScreen').style.display = 'flex';
        ['topBar','sidebar','mainContent','footer','sidebarOverlay'].forEach(id => {
            document.getElementById(id).style.display = 'none';
        });
        document.getElementById('authFormContainer').innerHTML = view === 'login' ? `
            <div class="auth-input-group"><i class="fas fa-user"></i><input type="text" id="lu" class="auth-input" placeholder="Usuario"></div>
            <div class="auth-input-group"><i class="fas fa-lock"></i><input type="password" id="lp" class="auth-input" placeholder="Contraseña"></div>
            <button class="btn-auth" onclick="login()"><i class="fas fa-sign-in-alt me-2"></i> Iniciar Sesión</button>
            <div class="auth-divider">¿No tienes cuenta?</div>
            <a class="auth-link" onclick="showAuth('register')">Crear una cuenta <i class="fas fa-arrow-right ms-1"></i></a>
        ` : `
            <div class="auth-input-group"><i class="fas fa-user"></i><input type="text" id="ru" class="auth-input" placeholder="Usuario"></div>
            <div class="auth-input-group"><i class="fas fa-lock"></i><input type="password" id="rp" class="auth-input" placeholder="Contraseña"></div>
            <div class="auth-input-group"><i class="fas fa-key"></i><input type="text" id="rc" class="auth-input" placeholder="Código de invitación"></div>
            <button class="btn-auth" onclick="register()"><i class="fas fa-user-plus me-2"></i> Crear Cuenta</button>
            <div class="auth-divider">¿Ya tienes cuenta?</div>
            <a class="auth-link" onclick="showAuth('login')">Iniciar Sesión <i class="fas fa-arrow-right ms-1"></i></a>
        `;
    }

    function login() {
        const u = document.getElementById('lu')?.value.trim();
        const p = document.getElementById('lp')?.value.trim();
        if (!u || !p) return alert('Completa todos los campos');
        const user = getUsers().find(x => x.username === u && x.password === p);
        if (user) { setCurrent({ username: user.username }); showApp(); }
        else alert('Credenciales incorrectas');
    }

    function register() {
        const u = document.getElementById('ru')?.value.trim();
        const p = document.getElementById('rp')?.value.trim();
        const c = document.getElementById('rc')?.value.trim();
        if (!u || !p || !c) return alert('Completa todos los campos');
        if (c !== CODE) return alert('Código de invitación inválido. Usa: ' + CODE);
        const users = getUsers();
        if (users.find(x => x.username === u)) return alert('El usuario ya existe');
        users.push({ username: u, password: p });
        saveUsers(users); setCurrent({ username: u });
        showApp();
        alert('¡Cuenta creada! Bienvenido al Plan Pro 🚀');
    }

    function logout() { localStorage.removeItem('vcu'); showAuth('login'); }

    function updateUserUI() {
        const user = getCurrent();
        if (user) {
            document.getElementById('userSection').innerHTML = `
                <span style="color:#c9b0ff;font-size:14px;font-weight:500;">
                    <i class="fas fa-user-circle me-2"></i>${user.username}
                </span>
                <button class="btn-logout" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Salir
                </button>
            `;
        }
    }

    // ============================================================
    //  SETTINGS
    // ============================================================
    let settings = {
        name: "EL VIGILANTE",
        version: "v2.0 · Plan Pro",
        description: "API profesional con endpoints exclusivos.",
        header: { imageSrc: ["https://files.catbox.moe/0tha19.png"] },
        categories: []
    };

    async function loadSettings() {
        try {
            const r = await fetch('/src/settings.json');
            if (r.ok) settings = await r.json();
        } catch (e) {
            // fallback demo
            settings.categories = [
                { name: "Usuarios",   items: [{ name: "Perfil",   path: "/api/user",          desc: "Obtener perfil",   innerDesc: "Datos del perfil" }] },
                { name: "Contenido",  items: [{ name: "Feed",     path: "/api/feed",          desc: "Feed dinámico",    innerDesc: "Publicaciones" }] },
                { name: "Búsqueda",   items: [{ name: "YouTube",  path: "/search/youtube?q=", desc: "Buscar videos",    innerDesc: "Ej: Goku Black" }] },
                { name: "Música",     items: [{ name: "Canción",  path: "/api/song",          desc: "Info canción",     innerDesc: "Canción actual" }] }
            ];
        }
        document.getElementById('apiName').textContent = settings.name;
        document.getElementById('footerText').innerHTML = `🛡️ ${settings.name} · Plan Pro · Música: Acento Quinto Real`;

        const nav = document.getElementById('categoriesNav');
        nav.innerHTML = '';
        settings.categories?.forEach(cat => {
            const d = document.createElement('div');
            d.className = 'sidebar-item';
            d.dataset.page     = 'category';
            d.dataset.category = cat.name;
            d.innerHTML        = `<i class="fas fa-folder"></i> ${cat.name}`;
            nav.appendChild(d);
        });
    }

    function getTotal() {
        return settings.categories?.reduce((t, c) => t + (c.items?.length || 0), 0) || 0;
    }

    // ============================================================
    //  UI / SIDEBAR
    // ============================================================
    function initUI() {
        const toggle  = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        toggle.onclick  = () => { toggle.classList.toggle('active'); sidebar.classList.toggle('active'); overlay.classList.toggle('active'); };
        overlay.onclick = () => { toggle.classList.remove('active'); sidebar.classList.remove('active'); overlay.classList.remove('active'); };
        refreshSidebar();
    }

    function closeSidebar() {
        document.getElementById('menuToggle').classList.remove('active');
        document.getElementById('sidebar').classList.remove('active');
        document.getElementById('sidebarOverlay').classList.remove('active');
    }

    function refreshSidebar() {
        document.querySelectorAll('.sidebar-item').forEach(item => {
            item.onclick = function () {
                document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
                this.classList.add('active');
                const page = this.dataset.page, cat = this.dataset.category;
                renderPage(page === 'category' ? 'category' : page, cat);
                closeSidebar();
            };
        });
    }

    // ============================================================
    //  PÁGINAS
    // ============================================================
    function renderPage(page, cat = null) {
        const c = document.getElementById('mainContent');

        if (page === 'home') {
            c.innerHTML = `
                <div class="hero-section">
                    <img src="${settings.header?.imageSrc?.[0] || 'https://files.catbox.moe/0tha19.png'}" class="hero-image" onerror="this.src='https://files.catbox.moe/0tha19.png'">
                    <h1 class="hero-title">API DE EL VIGILANTE</h1>
                    <p class="hero-subtitle">${settings.description}</p>
                    <div class="hero-version"><i class="fas fa-crown" style="color:#fbbf24;"></i> ${settings.version}</div>
                </div>
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-code"></i></div><div class="stat-number">${getTotal()}</div><div class="stat-label">Endpoints</div></div>
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-layer-group"></i></div><div class="stat-number">${settings.categories?.length || 0}</div><div class="stat-label">Categorías</div></div>
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-music"></i></div><div class="stat-number">24/7</div><div class="stat-label">Música</div></div>
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-shield-halved"></i></div><div class="stat-number">PRO</div><div class="stat-label">Plan</div></div>
                </div>`;

        } else if (page === 'status') {
            c.innerHTML = `
                <div class="page-header"><div class="page-title">Estado del Sistema</div><div class="page-subtitle">Monitoreo en tiempo real</div></div>
                <div class="status-grid">
                    <div class="status-card"><div class="status-card-icon"><i class="fas fa-server"></i></div><div class="status-card-title">API</div><div class="status-card-value"><span class="status-indicator"></span> Online</div></div>
                    <div class="status-card"><div class="status-card-icon"><i class="fas fa-code-branch"></i></div><div class="status-card-title">Versión</div><div class="status-card-value">${settings.version}</div></div>
                    <div class="status-card"><div class="status-card-icon"><i class="fas fa-cubes"></i></div><div class="status-card-title">Endpoints</div><div class="status-card-value">${getTotal()}</div></div>
                    <div class="status-card"><div class="status-card-icon"><i class="fas fa-music"></i></div><div class="status-card-title">Música</div><div class="status-card-value" style="color:#9b4dff;">🎵 Una vaina loca</div></div>
                </div>`;

        } else if (page === 'category' && cat) {
            const category = settings.categories.find(x => x.name === cat);
            if (!category) return;
            c.innerHTML = `
                <div class="page-header">
                    <div class="page-title"><i class="fas fa-folder-open me-2" style="color:#9b4dff;"></i>${category.name}</div>
                    <div class="page-subtitle">${category.items.length} endpoints</div>
                </div>
                <input type="text" class="search-input" placeholder="🔍 Buscar endpoints..." id="searchInput">
                <div class="endpoints-grid">${buildCards(category.items)}</div>`;
            setupSearch(); setupButtons();

        } else if (page === 'all') {
            c.innerHTML = `
                <div class="page-header"><div class="page-title">Todos los Endpoints</div><div class="page-subtitle">${getTotal()} endpoints</div></div>
                <input type="text" class="search-input" placeholder="🔍 Buscar..." id="searchInput">
                ${settings.categories.map(cat => `
                    <h3 style="color:#c9b0ff;font-size:18px;margin:28px 0 18px;">
                        <i class="fas fa-folder me-2" style="color:#9b4dff;"></i>${cat.name}
                    </h3>
                    <div class="endpoints-grid">${buildCards(cat.items)}</div>
                `).join('')}`;
            setupSearch(); setupButtons();
        }
    }

    function buildCards(items) {
        return items.map(item => `
            <div class="endpoint-card" data-name="${(item.name || '').toLowerCase()}">
                <span class="endpoint-method">GET</span>
                <div class="endpoint-name">${item.name}</div>
                <div class="endpoint-path">${item.path}</div>
                <div class="endpoint-desc">${item.desc}</div>
                <div class="endpoint-actions">
                    <button class="btn-probar"
                        data-path="${item.path}"
                        data-name="${item.name}"
                        data-desc="${item.desc || ''}"
                        data-inner="${item.innerDesc || ''}">
                        <i class="fas fa-play"></i> Probar
                    </button>
                    <button class="btn-copiar" data-path="${item.path}">
                        <i class="fas fa-copy"></i>
                    </button>
                </div>
            </div>
        `).join('');
    }

    function setupSearch() {
        const inp = document.getElementById('searchInput');
        if (!inp) return;
        inp.oninput = e => {
            const t = e.target.value.toLowerCase();
            document.querySelectorAll('.endpoint-card').forEach(card => {
                card.style.display = card.dataset.name.includes(t) ? '' : 'none';
            });
        };
    }

    // ============================================================
    //  MODAL PROBADOR — lógica corregida
    // ============================================================
    let _modalInstance = null; // instancia Bootstrap reutilizada

    function setupButtons() {
        // — Botón "Probar" —
        document.querySelectorAll('.btn-probar').forEach(btn => {
            btn.addEventListener('click', function () {
                const rawPath  = this.dataset.path;
                const name     = this.dataset.name;
                const desc     = this.dataset.desc;
                const inner    = this.dataset.inner;

                openEndpointModal(rawPath, name, desc, inner);
            });
        });

        // — Botón copiar URL —
        document.querySelectorAll('.btn-copiar').forEach(btn => {
            btn.addEventListener('click', function () {
                const url = window.location.origin + this.dataset.path;
                navigator.clipboard.writeText(url).then(() => {
                    this.innerHTML = '<i class="fas fa-check"></i>';
                    this.style.color = '#10b981';
                    setTimeout(() => { this.innerHTML = '<i class="fas fa-copy"></i>'; this.style.color = ''; }, 2000);
                }).catch(() => {
                    prompt('Copia la URL:', url);
                });
            });
        });
    }

    function openEndpointModal(rawPath, name, desc, inner) {
        // Separar base path y query params definidos en la ruta
        const [basePath, queryStr] = rawPath.split('?');
        const definedParams = new URLSearchParams(queryStr || '');
        const paramKeys     = [...definedParams.keys()];
        const baseUrl       = window.location.origin + basePath;

        // Rellenar cabecera
        document.getElementById('modalTitle').textContent = name;
        document.getElementById('modalDesc').textContent  = desc;

        // Mostrar URL base
        document.getElementById('endpointUrlCode').textContent = baseUrl;

        // Limpiar áreas
        document.getElementById('paramsContainer').innerHTML = '';
        document.getElementById('modalStatus').innerHTML     = '';

        // Botón copiar URL del modal
        document.getElementById('btnCopyUrl').onclick = () => {
            navigator.clipboard.writeText(baseUrl).then(() => {
                const btn = document.getElementById('btnCopyUrl');
                btn.innerHTML = '<i class="fas fa-check"></i>';
                btn.style.color = '#10b981';
                setTimeout(() => { btn.innerHTML = '<i class="fas fa-copy"></i>'; btn.style.color = ''; }, 2000);
            }).catch(() => prompt('Copia la URL:', baseUrl));
        };

        const submitBtn = document.getElementById('submitBtn');

        if (paramKeys.length > 0) {
            // —— Endpoint CON parámetros: mostrar inputs ——
            let html = '';
            if (inner) {
                html += `<div class="inner-desc-box"><i class="fas fa-info-circle me-1" style="color:#9b4dff;"></i>${inner}</div>`;
            }
            paramKeys.forEach(k => {
                const placeholder = definedParams.get(k) || 'valor';
                html += `
                    <div class="param-label">${k}</div>
                    <input
                        type="text"
                        class="param-input"
                        data-param="${k}"
                        placeholder="Ej: ${placeholder}"
                    >`;
            });
            document.getElementById('paramsContainer').innerHTML = html;

            submitBtn.style.display = 'inline-flex';
            submitBtn.disabled      = false;
            submitBtn.innerHTML     = '<i class="fas fa-paper-plane"></i> Enviar petición';

            // Asignar handler limpio (reemplazar para evitar duplicados)
            const newBtn = submitBtn.cloneNode(true);
            submitBtn.parentNode.replaceChild(newBtn, newBtn); // no-op si ya está en DOM
            document.getElementById('submitBtn').onclick = () => sendRequest(baseUrl);

        } else {
            // —— Endpoint SIN parámetros: ejecutar directo ——
            submitBtn.style.display = 'none';
            showLoading();
            fetchEndpoint(baseUrl);
        }

        // Abrir modal
        if (!_modalInstance) {
            _modalInstance = new bootstrap.Modal(document.getElementById('apiModal'), { backdrop: true, keyboard: true });
        }
        _modalInstance.show();
    }

    function sendRequest(baseUrl) {
        const inputs = document.querySelectorAll('#paramsContainer .param-input');
        const params = new URLSearchParams();
        inputs.forEach(inp => {
            const v = inp.value.trim();
            if (v) params.append(inp.dataset.param, v);
        });
        const finalUrl = params.toString() ? baseUrl + '?' + params.toString() : baseUrl;

        // Actualizar URL mostrada
        document.getElementById('endpointUrlCode').textContent = finalUrl;

        showLoading();
        fetchEndpoint(finalUrl);
    }

    async function fetchEndpoint(url) {
        try {
            const controller = new AbortController();
            const timeoutId  = setTimeout(() => controller.abort(), 15000);

            const res  = await fetch(url, { signal: controller.signal });
            clearTimeout(timeoutId);

            let data;
            const contentType = res.headers.get('content-type') || '';
            if (contentType.includes('application/json')) {
                data = await res.json();
            } else {
                data = await res.text();
            }

            const isJson    = typeof data === 'object';
            const formatted = isJson ? JSON.stringify(data, null, 2) : data;
            const isOk      = res.ok;

            showResponse(formatted, isOk, res.status);
        } catch (err) {
            if (err.name === 'AbortError') {
                showResponse('Error: La petición tardó demasiado (timeout de 15 segundos).', false, 0);
            } else {
                showResponse(`Error: ${err.message}`, false, 0);
            }
        }
    }

    function showLoading() {
        document.getElementById('modalStatus').innerHTML = `
            <div class="loading-inline">
                <div class="spinner-sm"></div>
                <span>Enviando petición...</span>
            </div>`;
    }

    function showResponse(text, isOk, status) {
        const statusLabel = status > 0
            ? `<span class="response-status ${isOk ? 'status-ok' : 'status-err'}">${status} ${isOk ? '✓ OK' : '✗ Error'}</span>`
            : `<span class="response-status status-err">✗ Error de red</span>`;

        const escaped = text
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;');

        document.getElementById('modalStatus').innerHTML = `
            <div class="response-header">
                ${statusLabel}
                <button class="btn-copy-response" id="btnCopyResp">
                    <i class="fas fa-copy me-1"></i>Copiar
                </button>
            </div>
            <pre class="response-box ${isOk ? 'success' : 'error'}" id="responseText">${escaped}</pre>`;

        document.getElementById('btnCopyResp').onclick = () => {
            navigator.clipboard.writeText(text).then(() => {
                const b = document.getElementById('btnCopyResp');
                b.innerHTML = '<i class="fas fa-check me-1"></i>Copiado';
                b.style.color = '#10b981';
                setTimeout(() => { b.innerHTML = '<i class="fas fa-copy me-1"></i>Copiar'; b.style.color = ''; }, 2000);
            }).catch(() => {});
        };
    }

    // ============================================================
    //  INICIO
    // ============================================================
    async function start() {
        await loadSettings();
        initUI();
        if (getCurrent()) showApp();
        else showAuth('login');

        // Ocultar pantalla de carga
        setTimeout(() => {
            const ls = document.getElementById('loadingScreen');
            ls.style.opacity = '0';
            setTimeout(() => ls.style.display = 'none', 500);
        }, 400);
    }

    start();
    </script>
</body>
</html>
