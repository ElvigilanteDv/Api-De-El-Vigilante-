
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💙</text></svg>">
    <title>DANNY APIS · Profesional</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            transition: background 0.3s ease, color 0.2s ease;
            overflow-x: hidden;
        }

        /* ========== TEMA AZUL OSCURO / MARINO (único) ========== */
        body.blue-theme {
            background: linear-gradient(135deg, #0a192f 0%, #0b2b3b 100%);
            color: #e0f2fe;
        }

        body.blue-theme .top-bar,
        body.blue-theme .sidebar,
        body.blue-theme .status-card,
        body.blue-theme .endpoint-card,
        body.blue-theme .auth-card,
        body.blue-theme .modal-content,
        body.blue-theme .stat-card {
            background: rgba(10, 35, 55, 0.92);
            backdrop-filter: blur(12px);
            border-color: #1e4a6e;
            color: #f0f9ff;
        }

        body.blue-theme .search-input {
            background: #0b2b3b;
            border-color: #2c6e9e;
            color: #ffffff;
        }

        body.blue-theme .response-box {
            background: #071a28;
            border: 1px solid #1e4a6e;
            color: #b9e6ff;
        }

        body.blue-theme .sidebar-item:hover {
            background: #0d3b50;
        }

        body.blue-theme .sidebar-item.active {
            background: #0f4a62;
            border-left-color: #38bdf8;
            color: #7dd3fc;
        }

        body.blue-theme .stat-number {
            color: #38bdf8;
        }

        body.blue-theme .endpoint-btn {
            background: linear-gradient(135deg, #0f4a62, #0a2a3b);
            color: white;
        }

        body.blue-theme .endpoint-btn:hover {
            background: linear-gradient(135deg, #1e6a8a, #0f4a62);
        }

        body.blue-theme .submit-btn {
            background: linear-gradient(135deg, #0f4a62, #0a2a3b);
        }

        body.blue-theme .submit-btn:hover {
            background: linear-gradient(135deg, #1e6a8a, #0f4a62);
        }

        body.blue-theme .live-url-box {
            background: #071a28;
            color: #38bdf8;
            border-color: #1e6a8e;
        }

        body.blue-theme .home-version {
            background: #1e6a8a;
            color: white;
        }

        body.blue-theme .footer {
            border-top-color: #1e4a6e;
            color: #7fa3bc;
        }

        /* Loading Screen */
        #loadingScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a192f 0%, #0b2b3b 100%);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transition: opacity 0.5s ease;
        }

        .spinner-border {
            width: 3rem;
            height: 3rem;
            border: 3px solid #e0f2fe;
            border-top-color: #38bdf8;
        }

        /* ========== REPRODUCTOR FLOTANTE ========== */
        .music-player {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 320px;
            background: rgba(10, 35, 55, 0.96);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 15px;
            z-index: 10000;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(56, 189, 248, 0.3);
            transition: all 0.3s ease;
        }

        .music-player.minimized {
            width: 55px;
            padding: 10px;
            border-radius: 30px;
        }

        .music-player.minimized .music-info,
        .music-player.minimized .music-controls,
        .music-player.minimized .progress-container {
            display: none;
        }

        .music-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            color: #e0f2fe;
        }

        .music-title {
            font-size: 12px;
            font-weight: 600;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
            opacity: 0.8;
        }

        .music-toggle-min {
            background: none;
            border: none;
            color: #e0f2fe;
            cursor: pointer;
            font-size: 16px;
            padding: 0 5px;
            opacity: 0.7;
        }

        .music-info {
            text-align: center;
            margin-bottom: 10px;
        }

        .song-name {
            color: #e0f2fe;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .artist-name {
            color: rgba(56, 189, 248, 0.7);
            font-size: 11px;
        }

        .progress-container {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            height: 4px;
            margin: 8px 0;
            cursor: pointer;
        }

        .progress-bar {
            background: #38bdf8;
            border-radius: 10px;
            height: 100%;
            width: 0%;
            transition: width 0.1s linear;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            color: rgba(56, 189, 248, 0.6);
            font-size: 10px;
            margin-bottom: 10px;
        }

        .music-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 8px;
        }

        .control-btn {
            background: rgba(56, 189, 248, 0.2);
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #e0f2fe;
        }

        .control-btn:hover {
            background: rgba(56, 189, 248, 0.4);
            transform: scale(1.05);
        }

        .control-btn.play-btn {
            background: #38bdf8;
            width: 42px;
            height: 42px;
            color: #0a192f;
        }

        .control-btn.play-btn:hover {
            background: #7dd3fc;
        }

        /* ========== TOP BAR ========== */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 64px;
            background: rgba(10, 35, 55, 0.96);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #1e6a8e;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 28px;
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .menu-toggle {
            width: 40px;
            height: 40px;
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 5px;
            border-radius: 10px;
            transition: all 0.2s;
        }

        .menu-toggle:hover {
            background: #1e4a6e;
        }

        .menu-toggle span {
            display: block;
            width: 22px;
            height: 2px;
            background: #e0f2fe;
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        .menu-toggle.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }

        .menu-toggle.active span:nth-child(2) {
            opacity: 0;
        }

        .menu-toggle.active span:nth-child(3) {
            transform: rotate(-45deg) translate(7px, -6px);
        }

        .api-name {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, #7dd3fc, #38bdf8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .top-bar-right {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .logout-btn {
            background: none;
            border: 1px solid #1e6a8e;
            border-radius: 40px;
            padding: 6px 16px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            color: #e0f2fe;
        }

        .logout-btn:hover {
            background: #38bdf8;
            color: #0a192f;
            border-color: #38bdf8;
        }

        /* ========== SIDEBAR ========== */
        .sidebar {
            position: fixed;
            top: 64px;
            left: -280px;
            width: 280px;
            height: calc(100vh - 64px);
            background: rgba(10, 35, 55, 0.98);
            backdrop-filter: blur(12px);
            border-right: 1px solid #1e6a8e;
            overflow-y: auto;
            transition: left 0.3s ease;
            z-index: 999;
        }

        .sidebar.active {
            left: 0;
        }

        .sidebar-overlay {
            position: fixed;
            top: 64px;
            left: 0;
            width: 100%;
            height: calc(100vh - 64px);
            background: rgba(0, 0, 0, 0.5);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 998;
        }

        .sidebar-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .sidebar-nav {
            padding: 20px 0;
        }

        .sidebar-item {
            padding: 12px 24px;
            cursor: pointer;
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
            font-size: 14px;
            font-weight: 500;
            color: #cbd5e6;
        }

        .sidebar-item:hover {
            background: #0d3b50;
            color: #7dd3fc;
        }

        .sidebar-item.active {
            background: #0f4a62;
            border-left-color: #38bdf8;
            color: #7dd3fc;
        }

        .sidebar-category {
            padding: 20px 24px 8px;
            font-size: 11px;
            font-weight: 700;
            color: #5d8fae;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ========== MAIN CONTENT ========== */
        .main-content {
            margin-top: 80px;
            padding: 30px 24px;
            max-width: 1300px;
            margin-left: auto;
            margin-right: auto;
            min-height: calc(100vh - 100px);
        }

        /* ========== HOME ========== */
        .home-banner {
            text-align: center;
            animation: fadeInUp 0.5s ease;
        }

        .home-banner img {
            max-width: 55%;
            border-radius: 32px;
            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.4);
            margin-bottom: 30px;
            border: 2px solid #38bdf8;
        }

        .home-title {
            font-size: 56px;
            font-weight: 800;
            background: linear-gradient(135deg, #7dd3fc, #38bdf8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }

        .home-version {
            display: inline-block;
            background: #1e6a8a;
            color: white;
            padding: 6px 20px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .stats-grid {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 40px 0;
            flex-wrap: wrap;
        }

        .stat-card {
            background: rgba(10, 35, 55, 0.8);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 25px 35px;
            text-align: center;
            border: 1px solid #1e6a8e;
            min-width: 180px;
            transition: all 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: #38bdf8;
        }

        .stat-number {
            font-size: 48px;
            font-weight: 800;
            color: #38bdf8;
        }

        .stat-label {
            font-size: 14px;
            font-weight: 500;
            color: #9ec8e3;
            margin-top: 8px;
        }

        /* ========== STATUS & ENDPOINTS ========== */
        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-top: 30px;
        }

        .status-card {
            background: rgba(10, 35, 55, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid #1e6a8e;
            border-radius: 20px;
            padding: 24px;
            transition: all 0.3s ease;
        }

        .status-card:hover {
            transform: translateY(-3px);
            border-color: #38bdf8;
        }

        .endpoints-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .endpoint-card {
            background: rgba(10, 35, 55, 0.85);
            backdrop-filter: blur(8px);
            border: 1px solid #1e6a8e;
            border-radius: 20px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
        }

        .endpoint-card:hover {
            transform: translateY(-3px);
            border-color: #38bdf8;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .endpoint-info {
            flex: 1;
        }

        .endpoint-name {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 6px;
            color: #e0f2fe;
        }

        .endpoint-desc {
            font-size: 12px;
            color: #9ec8e3;
        }

        .endpoint-btn {
            background: linear-gradient(135deg, #0f4a62, #0a2a3b);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            margin-left: 15px;
        }

        .endpoint-btn:hover {
            background: linear-gradient(135deg, #1e6a8a, #0f4a62);
            transform: scale(1.02);
        }

        /* ========== SEARCH ========== */
        .search-box {
            margin-bottom: 32px;
        }

        .search-input {
            width: 100%;
            padding: 14px 20px;
            border: 1px solid #1e6a8e;
            border-radius: 60px;
            font-size: 15px;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            background: #0b2b3b;
            color: #e0f2fe;
        }

        .search-input:focus {
            outline: none;
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
        }

        .category-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 2px solid #1e6a8e;
            color: #7dd3fc;
        }

        /* ========== MODAL ========== */
        .modal-content {
            border: none;
            border-radius: 24px;
            background: #0e2a3a;
            color: #e0f2fe;
        }

        .modal-header .btn-close {
            filter: invert(1);
        }

        .api-endpoint-box {
            background: #071a28;
            padding: 12px;
            border-radius: 12px;
            font-family: monospace;
            font-size: 13px;
            color: #7dd3fc;
            word-break: break-all;
            margin-bottom: 20px;
            border: 1px solid #1e6a8e;
        }

        .live-url-box {
            background: #071a28;
            padding: 12px 16px;
            border-radius: 12px;
            font-family: monospace;
            font-size: 13px;
            color: #38bdf8;
            word-break: break-all;
            margin-bottom: 20px;
            border: 1px solid #2c6e9e;
        }

        .param-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #1e6a8e;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 12px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            background: #0b2b3b;
            color: #e0f2fe;
        }

        .param-input:focus {
            outline: none;
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.1);
        }

        .response-box {
            background: #071a28;
            padding: 16px;
            border-radius: 14px;
            font-family: monospace;
            font-size: 12px;
            color: #b9e6ff;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: 400px;
            overflow-y: auto;
            margin-top: 20px;
        }

        .submit-btn {
            background: linear-gradient(135deg, #0f4a62, #0a2a3b);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .submit-btn:hover {
            background: linear-gradient(135deg, #1e6a8a, #0f4a62);
        }

        /* ========== FOOTER ========== */
        .footer {
            text-align: center;
            padding: 30px;
            border-top: 1px solid #1e6a8e;
            margin-top: 50px;
            font-size: 13px;
            color: #7fa3bc;
        }

        /* ========== AUTH MODAL (solo login) ========== */
        .auth-card {
            max-width: 440px;
            margin: auto;
            background: #0e2a3a;
            border-radius: 32px;
            padding: 32px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.4);
            border: 1px solid #1e6a8e;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .auth-header img {
            width: 90px;
            border-radius: 30px;
            margin-bottom: 15px;
            border: 2px solid #38bdf8;
        }

        /* ========== ANIMATIONS ========== */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .home-title {
                font-size: 36px;
            }
            .stat-card {
                padding: 15px 20px;
                min-width: 140px;
            }
            .stat-number {
                font-size: 32px;
            }
            .music-player {
                width: 280px;
            }
            .endpoints-grid {
                grid-template-columns: 1fr;
            }
            .main-content {
                padding: 20px 16px;
            }
            .top-bar {
                padding: 0 16px;
            }
            .api-name {
                font-size: 18px;
            }
        }
    </style>
</head>
<body class="blue-theme">
    <!-- LOADING SCREEN -->
    <div id="loadingScreen">
        <div class="spinner-border" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
        <p style="margin-top: 16px; font-weight: 500; color: #e0f2fe;">Iniciando Danny Apis 💙</p>
    </div>

    <!-- REPRODUCTOR DE MÚSICA FLOTANTE -->
    <div class="music-player" id="musicPlayer">
        <div class="music-header">
            <span class="music-title">🎵 ACENTO · QUINTO REAL</span>
            <button class="music-toggle-min" id="toggleMinimize">−</button>
        </div>
        <div class="music-info">
            <div class="song-name" id="songName">Una vaina loca</div>
            <div class="artist-name" id="artistName">Acento Quinto Real</div>
        </div>
        <div class="progress-container" id="progressContainer">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="time-info">
            <span id="currentTime">0:00</span>
            <span id="duration">0:00</span>
        </div>
        <div class="music-controls">
            <button class="control-btn" id="prevBtn"><i class="fas fa-backward"></i></button>
            <button class="control-btn play-btn" id="playPauseBtn"><i class="fas fa-play"></i></button>
            <button class="control-btn" id="nextBtn"><i class="fas fa-forward"></i></button>
        </div>
    </div>
    <audio id="audioPlayer"></audio>

    <!-- TOP BAR -->
    <div class="top-bar">
        <div class="top-bar-left">
            <button class="menu-toggle" id="menuToggle">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <div class="api-name" id="apiName">DANNY APIS</div>
        </div>
        <div class="top-bar-right">
            <button class="logout-btn" id="logoutBtn" style="display: none;"><i class="fas fa-sign-out-alt"></i> Salir</button>
        </div>
    </div>

    <!-- SIDEBAR -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-nav">
            <div class="sidebar-item active" data-page="home"><i class="fas fa-home me-2"></i> Inicio</div>
            <div class="sidebar-item" data-page="status"><i class="fas fa-chart-line me-2"></i> Estado</div>
            <div class="sidebar-category"><i class="fas fa-tag me-2"></i> Categorías</div>
            <div id="categoriesNav"></div>
            <div class="sidebar-item" data-page="all"><i class="fas fa-cubes me-2"></i> Todos los endpoints</div>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content" id="mainContent"></div>

    <!-- FOOTER -->
    <div class="footer">
        <p id="footerText">💙 DANNY APIS · Creada por Danny · Música: Acento Quinto Real</p>
    </div>

    <!-- MODAL PARA ENDPOINTS -->
    <div class="modal fade" id="apiModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <div>
                        <h5 class="modal-title" id="modalTitle"></h5>
                        <p class="modal-desc" id="modalDesc"></p>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="api-endpoint-box" id="endpointBox" style="display: none;"></div>
                    <div class="live-url-box" id="liveUrlBox" style="display: none;">
                        <i class="fas fa-link me-2"></i> <span id="liveUrlText">https://ejemplo.com/api</span>
                    </div>
                    <div id="paramsContainer"></div>
                    <div id="loadingContainer" style="display: none; text-align: center; padding: 40px;">
                        <div class="spinner-border" role="status"></div>
                    </div>
                    <div id="responseContainer"></div>
                </div>
                <div class="modal-footer">
                    <button class="submit-btn" id="submitBtn" style="display: none;">Enviar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ==================== AUTENTICACIÓN (SOLO LOGIN) ====================
        let currentUser = JSON.parse(localStorage.getItem('danny_user'));
        let usersDB = JSON.parse(localStorage.getItem('danny_users') || '[]');

        function saveUsers() { localStorage.setItem('danny_users', JSON.stringify(usersDB)); }
        function saveCurrentUser() { if(currentUser) localStorage.setItem('danny_user', JSON.stringify(currentUser)); else localStorage.removeItem('danny_user'); }

        function showAuthModal() {
            const modalHTML = `
                <div class="modal fade" id="authModal" tabindex="-1" data-bs-backdrop="static">
                    <div class="modal-dialog modal-dialog-centered">
                        <div class="modal-content auth-card">
                            <div class="auth-header">
                                <img src="https://files.catbox.moe/osy7r9.jpg" alt="DANNY APIS">
                                <h3 class="mt-3" style="color:#7dd3fc;">Bienvenido a Danny Apis</h3>
                                <p class="text-info">API Profesional</p>
                            </div>
                            <div class="tab-pane fade show active">
                                <input type="text" id="loginUser" class="form-control mb-2" placeholder="Usuario" style="background:#0b2b3b; border-color:#1e6a8e; color:white;">
                                <input type="password" id="loginPass" class="form-control mb-2" placeholder="Contraseña" style="background:#0b2b3b; border-color:#1e6a8e; color:white;">
                                <button id="doLoginBtn" class="btn w-100 mt-2" style="background:#38bdf8; color:#0a192f; font-weight:600;">Entrar</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHTML);
            const modalEl = document.getElementById('authModal');
            const authModal = new bootstrap.Modal(modalEl, { backdrop: 'static', keyboard: false });
            authModal.show();

            document.getElementById('doLoginBtn').onclick = () => {
                const user = document.getElementById('loginUser').value.trim();
                const pass = document.getElementById('loginPass').value.trim();
                const found = usersDB.find(u => u.username === user && u.password === pass);
                if(found) {
                    currentUser = found;
                    saveCurrentUser();
                    authModal.hide();
                    location.reload();
                } else {
                    alert('❌ Usuario o contraseña incorrectos');
                }
            };
        }

        if(!currentUser) {
            showAuthModal();
        }

        document.getElementById('logoutBtn').onclick = () => {
            currentUser = null;
            saveCurrentUser();
            location.reload();
        };
        if(currentUser) document.getElementById('logoutBtn').style.display = 'flex';

        // ==================== REPRODUCTOR ====================
        const playlist = [
            { name: "Acento Quinto Real", artist: "Alya", url: "https://files.catbox.moe/65kqmi.mp3" },
            { name: "Una vaina loca", artist: "Alya", url: "https://files.catbox.moe/g2zd2z.mp3" }
        ];
        let currentSongIndex = 0, isPlaying = false, isMinimized = false;
        const audioEl = document.getElementById('audioPlayer');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const songNameEl = document.getElementById('songName');
        const artistNameEl = document.getElementById('artistName');
        const progressBar = document.getElementById('progressBar');
        const progressContainer = document.getElementById('progressContainer');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const toggleMinimizeBtn = document.getElementById('toggleMinimize');
        const musicPlayerDiv = document.getElementById('musicPlayer');

        function loadSong(index) {
            const song = playlist[index];
            songNameEl.textContent = song.name;
            artistNameEl.textContent = song.artist;
            audioEl.src = song.url;
            audioEl.load();
            if(isPlaying) audioEl.play().catch(e=>console.log);
            updatePlayIcon();
        }
        function updatePlayIcon() { playPauseBtn.querySelector('i').className = isPlaying ? 'fas fa-pause' : 'fas fa-play'; }
        function playPauseSong() { isPlaying ? audioEl.pause() : audioEl.play().catch(e=>console.log); isPlaying = !isPlaying; updatePlayIcon(); }
        function nextSong() { currentSongIndex = (currentSongIndex+1)%playlist.length; loadSong(currentSongIndex); if(!isPlaying) playPauseSong(); }
        function prevSong() { currentSongIndex = (currentSongIndex-1+playlist.length)%playlist.length; loadSong(currentSongIndex); if(!isPlaying) playPauseSong(); }
        function updateProgress() { if(audioEl.duration && !isNaN(audioEl.duration)) { progressBar.style.width = `${(audioEl.currentTime/audioEl.duration)*100}%`; currentTimeEl.textContent = formatTime(audioEl.currentTime); durationEl.textContent = formatTime(audioEl.duration); } }
        function formatTime(s) { if(isNaN(s)) return "0:00"; const m = Math.floor(s/60), seg = Math.floor(s%60); return `${m}:${seg.toString().padStart(2,'0')}`; }
        function setProgress(e) { const rect = progressContainer.getBoundingClientRect(); audioEl.currentTime = ((e.clientX - rect.left)/rect.width) * audioEl.duration; }
        function toggleMinimizePlayer() { isMinimized = !isMinimized; musicPlayerDiv.classList.toggle('minimized'); toggleMinimizeBtn.textContent = isMinimized ? '+' : '−'; }
        playPauseBtn.onclick = playPauseSong; nextBtn.onclick = nextSong; prevBtn.onclick = prevSong; audioEl.ontimeupdate = updateProgress; audioEl.onended = nextSong; progressContainer.onclick = setProgress; toggleMinimizeBtn.onclick = toggleMinimizePlayer;
        loadSong(0);

        // ==================== API Y DASHBOARD (Danny Apis) ====================
        let settings = {
            name: "DANNY APIS",
            version: "v2.0 · Danny",
            description: "API profesional con endpoints creados por Danny",
            header: { imageSrc: ["https://files.catbox.moe/osy7r9.jpg"], imageSize: { desktop: "50%" } },
            apiSettings: { creator: "Danny" },
            categories: [
                { name: "Usuarios", items: [{ name: "Perfil", path: "/api/user", desc: "Obtener perfil de usuario", innerDesc: "Devuelve datos del perfil del usuario autenticado" }] },
                { name: "Contenido", items: [{ name: "Feed", path: "/api/feed", desc: "Feed dinámico de contenido", innerDesc: "Obtiene las últimas publicaciones" }] },
                { name: "Búsqueda", items: [{ name: "YouTube Search", path: "/search/youtube?q=", desc: "Buscar videos en YouTube", innerDesc: "Ejemplo: Goku Black" }] },
                { name: "Música", items: [{ name: "Canción actual", path: "/api/song", desc: "Obtener información de la canción", innerDesc: "Devuelve los datos de la canción que suena actualmente" }] }
            ]
        };
        async function loadSettings() {
            try { const r = await fetch('/src/settings.json'); if(r.ok) settings = await r.json(); } catch(e) { console.log('default'); }
            document.title = settings.name || "DANNY APIS";
            document.getElementById('apiName').innerHTML = settings.name || "DANNY APIS";
            document.getElementById('footerText').innerHTML = `💙 ${settings.name} · Creada por ${settings.apiSettings?.creator || 'Danny'} · Ac. Alya`;
            const categoriesNav = document.getElementById('categoriesNav');
            if(settings.categories) settings.categories.forEach(cat => { const div = document.createElement('div'); div.className = 'sidebar-item'; div.dataset.page = 'category'; div.dataset.category = cat.name; div.innerHTML = `<i class="fas fa-folder me-2"></i> ${cat.name}`; categoriesNav.appendChild(div); });
        }
        function getTotalEndpoints() { let t=0; settings.categories?.forEach(c=> t+=c.items.length); return t; }
        function initUI() {
            const menuToggle = document.getElementById('menuToggle'), sidebar = document.getElementById('sidebar'), overlay = document.getElementById('sidebarOverlay');
            menuToggle.onclick = () => { menuToggle.classList.toggle('active'); sidebar.classList.toggle('active'); overlay.classList.toggle('active'); };
            overlay.onclick = () => { menuToggle.classList.remove('active'); sidebar.classList.remove('active'); overlay.classList.remove('active'); };
            document.querySelectorAll('.sidebar-item').forEach(item => { item.onclick = () => { document.querySelectorAll('.sidebar-item').forEach(i=>i.classList.remove('active')); item.classList.add('active'); const page = item.dataset.page, cat = item.dataset.category; renderPage(page==='category'?'category':page, cat); menuToggle.classList.remove('active'); sidebar.classList.remove('active'); overlay.classList.remove('active'); }; });
        }
        function renderPage(page, category=null) {
            const container = document.getElementById('mainContent');
            if(page === 'home') {
                const imgSrc = Array.isArray(settings.header.imageSrc)? settings.header.imageSrc[0]:'https://files.catbox.moe/osy7r9.jpg';
                container.innerHTML = `<div class="home-banner"><img src="${imgSrc}" alt="Danny Apis"><h1 class="home-title">${settings.name}</h1><div class="home-version">${settings.version}</div><p class="text-info mb-4">${settings.description}</p><div class="stats-grid"><div class="stat-card"><div class="stat-number">${getTotalEndpoints()}</div><div class="stat-label">Endpoints</div></div><div class="stat-card"><div class="stat-number">${settings.categories?.length||0}</div><div class="stat-label">Categorías</div></div><div class="stat-card"><div class="stat-number"><i class="fas fa-music"></i></div><div class="stat-label">Acento Quinto Real</div></div></div><p class="mt-3"><i class="fas fa-headphones text-info"></i> Disfruta de "Una vaina loca" mientras exploras la API</p></div>`;
            } else if(page === 'status') {
                container.innerHTML = `<h2 class="category-title"><i class="fas fa-chart-line me-2"></i> Estado del sistema</h2><div class="status-grid"><div class="status-card"><div class="status-card-title">API Status</div><div class="status-card-value" style="color:#38bdf8;">🟢 Online</div></div><div class="status-card"><div class="status-card-title">Versión</div><div class="status-card-value">${settings.version}</div></div><div class="status-card"><div class="status-card-title">Música Activa</div><div class="status-card-value" style="color:#38bdf8;">🎵 Una vaina loca</div></div><div class="status-card"><div class="status-card-title">Artista</div><div class="status-card-value">Acento Quinto Real</div></div></div>`;
            } else if(page === 'category' && category) {
                const cat = settings.categories.find(c=>c.name===category); if(!cat) return;
                container.innerHTML = `<div class="search-box"><input type="text" class="search-input" placeholder="🔍 Buscar endpoints..." id="searchInput"></div><div class="category-section"><h2 class="category-title"><i class="fas fa-folder-open me-2"></i> ${cat.name}</h2><div class="endpoints-grid" id="endpointsGrid">${cat.items.map(item=>`<div class="endpoint-card" data-name="${item.name.toLowerCase()}"><div class="endpoint-info"><div class="endpoint-name"><i class="fas fa-code me-2"></i> ${item.name}</div><div class="endpoint-desc">${item.desc}</div></div><button class="endpoint-btn" data-path="${item.path}" data-name="${item.name}" data-desc="${item.desc}" data-inner="${item.innerDesc||''}">GET <i class="fas fa-arrow-right ms-1"></i></button></div>`).join('')}</div></div>`;
                setupSearch(); attachEndpointEvents();
            } else if(page === 'all') {
                container.innerHTML = `<div class="search-box"><input type="text" class="search-input" placeholder="🔍 Buscar endpoints..." id="searchInput"></div><div id="allCategories"></div>`;
                const allDiv = document.getElementById('allCategories');
                settings.categories?.forEach(cat=>{ allDiv.innerHTML += `<div class="category-section" data-category="${cat.name}"><h2 class="category-title"><i class="fas fa-cube me-2"></i> ${cat.name}</h2><div class="endpoints-grid">${cat.items.map(item=>`<div class="endpoint-card" data-name="${item.name.toLowerCase()}"><div class="endpoint-info"><div class="endpoint-name"><i class="fas fa-code me-2"></i> ${item.name}</div><div class="endpoint-desc">${item.desc}</div></div><button class="endpoint-btn" data-path="${item.path}" data-name="${item.name}" data-desc="${item.desc}" data-inner="${item.innerDesc||''}">GET <i class="fas fa-arrow-right ms-1"></i></button></div>`).join('')}</div></div>`; });
                setupSearch(); attachEndpointEvents();
            }
        }
        function setupSearch() { const inp = document.getElementById('searchInput'); if(!inp) return; inp.oninput = (e) => { const term = e.target.value.toLowerCase(); document.querySelectorAll('.endpoint-card').forEach(card=>{ card.style.display = card.dataset.name.includes(term) ? '' : 'none'; }); document.querySelectorAll('.category-section').forEach(section=>{ const visible = section.querySelectorAll('.endpoint-card:not([style*="display: none"])'); section.style.display = visible.length ? '' : 'none'; }); }; }
        function attachEndpointEvents() { document.querySelectorAll('.endpoint-btn').forEach(btn=>{ btn.onclick = ()=> openModal(btn.dataset.path, btn.dataset.name, btn.dataset.desc, btn.dataset.inner); }); }
        async function openModal(path, name, desc, innerDesc) {
            const modal = new bootstrap.Modal(document.getElementById('apiModal'));
            document.getElementById('modalTitle').textContent = name; document.getElementById('modalDesc').textContent = desc;
            const urlParts = path.split('?'); const basePath = urlParts[0]; const existingParams = new URLSearchParams(urlParts[1]||'');
            const baseUrl = window.location.origin + basePath;
            document.getElementById('endpointBox').style.display = 'block'; document.getElementById('endpointBox').innerHTML = `<code>${baseUrl}</code>`;
            const liveUrlBox = document.getElementById('liveUrlBox'); const liveUrlText = document.getElementById('liveUrlText'); liveUrlBox.style.display = 'block';
            document.getElementById('paramsContainer').innerHTML = ''; document.getElementById('responseContainer').innerHTML = ''; document.getElementById('submitBtn').style.display = 'none'; document.getElementById('loadingContainer').style.display = 'none';
            const hasParams = existingParams.keys().next().done === false;
            function updateLiveUrl() { const params = new URLSearchParams(); document.querySelectorAll('#paramsContainer .param-input').forEach(inp=>{ if(inp.value.trim()) params.append(inp.dataset.param, inp.value.trim()); }); let final = baseUrl; const ps = params.toString(); if(ps) final += '?'+ps; else if(hasParams && document.querySelectorAll('#paramsContainer .param-input').length===0) final += '?'+existingParams.toString(); liveUrlText.textContent = final; }
            if(hasParams) {
                const paramsContainer = document.getElementById('paramsContainer');
                for(let [k,v] of existingParams) { const inp = document.createElement('input'); inp.type='text'; inp.className='param-input'; inp.placeholder=`${k} (ej: ${v||'valor'})...`; inp.dataset.param=k; paramsContainer.appendChild(inp); }
                if(innerDesc) paramsContainer.innerHTML += `<div class="inner-desc text-info small mt-2 mb-2"><i class="fas fa-info-circle me-1"></i> ${innerDesc}</div>`;
                const submitBtn = document.getElementById('submitBtn'); submitBtn.style.display='block';
                paramsContainer.querySelectorAll('.param-input').forEach(i=>i.addEventListener('input',updateLiveUrl));
                updateLiveUrl();
                submitBtn.onclick = async ()=>{
                    const params = new URLSearchParams(); document.querySelectorAll('#paramsContainer .param-input').forEach(inp=>{ if(inp.value.trim()) params.append(inp.dataset.param, inp.value.trim()); });
                    let finalUrl = baseUrl; const pstr = params.toString(); if(pstr) finalUrl += '?'+pstr;
                    document.getElementById('loadingContainer').style.display='block'; document.getElementById('responseContainer').innerHTML='';
                    try { const resp = await fetch(finalUrl); const ct = resp.headers.get('Content-Type'); if(ct && ct.startsWith('image/')){ const blob = await resp.blob(); const img = document.createElement('img'); img.src=URL.createObjectURL(blob); img.className='response-image w-100 mt-2 rounded'; document.getElementById('responseContainer').appendChild(img); } else { const data = await resp.json(); document.getElementById('responseContainer').innerHTML = `<pre class="response-box">${JSON.stringify(data,null,2)}</pre>`; } } catch(e){ document.getElementById('responseContainer').innerHTML = `<pre class="response-box text-danger">Error: ${e.message}</pre>`; }
                    document.getElementById('loadingContainer').style.display='none';
                };
            } else {
                liveUrlText.textContent = baseUrl;
                document.getElementById('loadingContainer').style.display='block';
                try { const resp = await fetch(baseUrl); const ct = resp.headers.get('Content-Type'); if(ct && ct.startsWith('image/')){ const blob = await resp.blob(); const img = document.createElement('img'); img.src=URL.createObjectURL(blob); img.className='response-image w-100 mt-2 rounded'; document.getElementById('responseContainer').appendChild(img); } else { const data = await resp.json(); document.getElementById('responseContainer').innerHTML = `<pre class="response-box">${JSON.stringify(data,null,2)}</pre>`; } } catch(e){ document.getElementById('responseContainer').innerHTML = `<pre class="response-box text-danger">Error: ${e.message}</pre>`; }
                document.getElementById('loadingContainer').style.display='none';
            }
            modal.show();
        }
        async function start() { await loadSettings(); initUI(); renderPage('home'); const loading = document.getElementById('loadingScreen'); loading.classList.add('fade-out'); setTimeout(()=>{loading.style.display='none';},500); }
        start();
    </script>
</body>
</html>
