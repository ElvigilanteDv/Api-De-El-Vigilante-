<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
    <title>API DE EL VIGILANTE · Profesional</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #08060e;
            color: #d9d0e6;
            overflow-x: hidden;
            background-image: 
                radial-gradient(ellipse at 20% 50%, rgba(155, 77, 255, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(155, 77, 255, 0.03) 0%, transparent 50%);
        }

        #loadingScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #08060e;
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(155, 77, 255, 0.2);
            border-top-color: #9b4dff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 64px;
            background: rgba(18, 14, 28, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid #2a1f40;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 1000;
        }

        .top-bar-left { display: flex; align-items: center; gap: 16px; }

        .menu-toggle {
            width: 36px;
            height: 36px;
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .menu-toggle:hover { background: rgba(155, 77, 255, 0.1); }

        .menu-toggle span {
            display: block;
            width: 20px;
            height: 2px;
            background: #d9d0e6;
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        .menu-toggle.active span:nth-child(1) { transform: rotate(45deg) translate(4px, 4px); }
        .menu-toggle.active span:nth-child(2) { opacity: 0; }
        .menu-toggle.active span:nth-child(3) { transform: rotate(-45deg) translate(6px, -5px); }

        .api-name {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, #c9b0ff, #9b4dff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .pro-badge {
            background: linear-gradient(135deg, #9b4dff, #6a1b9a);
            color: white;
            font-weight: 700;
            font-size: 10px;
            padding: 4px 10px;
            border-radius: 20px;
            margin-left: 10px;
            box-shadow: 0 0 12px rgba(155, 77, 255, 0.3);
        }

        .user-section { display: flex; align-items: center; gap: 10px; }

        .logout-btn {
            background: rgba(155, 77, 255, 0.1);
            border: 1px solid #2a1f40;
            color: #988ab3;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            transition: 0.2s;
        }

        .logout-btn:hover { background: rgba(155, 77, 255, 0.2); color: #d9d0e6; }

        .sidebar {
            position: fixed;
            top: 64px;
            left: -280px;
            width: 280px;
            height: calc(100vh - 64px);
            background: rgba(18, 14, 28, 0.95);
            backdrop-filter: blur(20px);
            border-right: 1px solid #2a1f40;
            overflow-y: auto;
            transition: left 0.3s ease;
            z-index: 999;
        }

        .sidebar.active { left: 0; }

        .sidebar-overlay {
            position: fixed;
            top: 64px;
            left: 0;
            width: 100%;
            height: calc(100vh - 64px);
            background: rgba(0, 0, 0, 0.6);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 998;
        }

        .sidebar-overlay.active { opacity: 1; visibility: visible; }

        .sidebar-nav { padding: 16px 0; }

        .sidebar-item {
            padding: 12px 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
            font-size: 14px;
            font-weight: 500;
            color: #988ab3;
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 2px 12px;
            border-radius: 8px;
        }

        .sidebar-item:hover { background: rgba(155, 77, 255, 0.1); color: #c9b0ff; }
        .sidebar-item.active { background: rgba(155, 77, 255, 0.15); border-left-color: #9b4dff; color: #c9b0ff; }

        .sidebar-category {
            padding: 20px 20px 8px;
            font-size: 10px;
            font-weight: 700;
            color: #6b5b85;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: 8px;
        }

        .main-content {
            margin-top: 80px;
            padding: 28px 32px;
            max-width: 1320px;
            margin-left: auto;
            margin-right: auto;
            min-height: calc(100vh - 120px);
        }

        .hero-section { text-align: center; margin-bottom: 50px; animation: fadeInUp 0.6s ease; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero-image {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 3px solid #9b4dff;
            box-shadow: 0 0 40px rgba(155, 77, 255, 0.3), 0 20px 40px rgba(0,0,0,0.5);
            margin-bottom: 30px;
            transition: all 0.3s ease;
        }

        .hero-image:hover { transform: scale(1.05); box-shadow: 0 0 60px rgba(155, 77, 255, 0.5); }

        .hero-title {
            font-size: 48px;
            font-weight: 900;
            background: linear-gradient(135deg, #d9c5ff, #9b4dff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .hero-subtitle { font-size: 16px; color: #988ab3; font-weight: 400; margin-bottom: 16px; }

        .hero-version {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(155, 77, 255, 0.15);
            border: 1px solid #2a1f40;
            color: #c9b0ff;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }

        .stat-card {
            background: rgba(18, 14, 28, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 28px 24px;
            text-align: center;
            border: 1px solid #2a1f40;
            transition: all 0.3s ease;
        }

        .stat-card:hover { transform: translateY(-6px); border-color: #9b4dff; }

        .stat-icon { font-size: 28px; margin-bottom: 12px; color: #9b4dff; }

        .stat-number { font-size: 40px; font-weight: 800; color: #d9d0e6; margin-bottom: 4px; }

        .stat-label { font-size: 13px; color: #988ab3; text-transform: uppercase; letter-spacing: 0.5px; }

        .endpoints-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
            margin-top: 20px;
        }

        .endpoint-card {
            background: rgba(18, 14, 28, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid #2a1f40;
            border-radius: 16px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .endpoint-card:hover { border-color: #9b4dff; transform: translateY(-3px); }

        .endpoint-method {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            color: #10b981;
            background: rgba(16, 185, 129, 0.1);
            padding: 3px 8px;
            border-radius: 6px;
            margin-bottom: 8px;
            display: inline-block;
        }

        .endpoint-name { font-size: 16px; font-weight: 700; color: #d9d0e6; margin-bottom: 4px; }
        .endpoint-desc { font-size: 12px; color: #988ab3; }

        .endpoint-btn {
            background: rgba(155, 77, 255, 0.15);
            border: 1px solid rgba(155, 77, 255, 0.3);
            color: #c9b0ff;
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .endpoint-btn:hover {
            background: rgba(155, 77, 255, 0.3);
            border-color: #9b4dff;
            box-shadow: 0 0 15px rgba(155, 77, 255, 0.3);
        }

        .search-input {
            width: 100%;
            padding: 14px 20px;
            border: 1px solid #2a1f40;
            border-radius: 16px;
            font-size: 15px;
            background: rgba(18, 14, 28, 0.6);
            color: #d9d0e6;
            margin-bottom: 24px;
        }

        .search-input:focus { outline: none; border-color: #9b4dff; }

        .page-header { margin-bottom: 30px; }
        .page-title { font-size: 28px; font-weight: 800; color: #d9d0e6; margin-bottom: 6px; }
        .page-subtitle { font-size: 14px; color: #988ab3; }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .feature-card {
            background: rgba(18, 14, 28, 0.7);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #2a1f40;
            transition: all 0.3s ease;
        }

        .feature-card:hover { border-color: #9b4dff; transform: translateY(-4px); }

        .feature-icon {
            width: 44px;
            height: 44px;
            background: rgba(155, 77, 255, 0.15);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #9b4dff;
            margin-bottom: 16px;
        }

        .feature-title { font-size: 16px; font-weight: 700; color: #d9d0e6; margin-bottom: 6px; }
        .feature-desc { font-size: 13px; color: #988ab3; line-height: 1.5; }

        .footer {
            text-align: center;
            padding: 28px;
            border-top: 1px solid #2a1f40;
            margin-top: 60px;
            font-size: 12px;
            color: #6b5b85;
        }

        #authScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #08060e;
            background-image: 
                radial-gradient(ellipse at 30% 30%, rgba(155, 77, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 70%, rgba(100, 50, 180, 0.06) 0%, transparent 50%);
            z-index: 10001;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .auth-card {
            background: rgba(18, 14, 28, 0.95);
            backdrop-filter: blur(25px);
            border: 1px solid #2a1f40;
            border-radius: 24px;
            padding: 40px;
            width: 420px;
            max-width: 90%;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            text-align: center;
        }

        .auth-logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid #9b4dff;
            box-shadow: 0 0 30px rgba(155, 77, 255, 0.4);
            margin-bottom: 20px;
        }

        .auth-title { font-size: 22px; font-weight: 800; color: #d9d0e6; margin-bottom: 4px; }
        .auth-subtitle { font-size: 13px; color: #988ab3; margin-bottom: 20px; }

        .auth-form input {
            width: 100%;
            margin-bottom: 14px;
            background: rgba(0,0,0,0.3);
            border: 1px solid #2a1f40;
            color: #d9d0e6;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.2s;
        }

        .auth-form input:focus { border-color: #9b4dff; outline: none; }

        .auth-btn {
            background: linear-gradient(135deg, #9b4dff, #6a1b9a);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            margin-top: 4px;
        }

        .auth-btn:hover { background: linear-gradient(135deg, #b87aff, #8a2be2); }

        .auth-link { color: #9b4dff; cursor: pointer; font-size: 13px; display: inline-block; margin-top: 12px; }
        .auth-link:hover { color: #c9b0ff; }
        .auth-divider { color: #6b5b85; margin: 14px 0; font-size: 12px; }

        .music-player {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 300px;
            background: rgba(18, 14, 28, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 16px;
            z-index: 9999;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            border: 1px solid #2a1f40;
            transition: all 0.3s ease;
        }

        .music-player.minimized { width: 50px; padding: 10px; border-radius: 50px; }
        .music-player.minimized .music-info,
        .music-player.minimized .music-controls,
        .music-player.minimized .progress-container { display: none; }

        .music-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .music-title { font-size: 11px; font-weight: 600; opacity: 0.7; }
        .music-info { text-align: center; margin-bottom: 10px; }
        .song-name { color: #d9d0e6; font-size: 14px; font-weight: 600; }
        .artist-name { color: #9b4dff; font-size: 11px; }

        .progress-container {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            height: 4px;
            margin: 10px 0;
            cursor: pointer;
        }

        .progress-bar {
            background: linear-gradient(135deg, #9b4dff, #6a1b9a);
            border-radius: 10px;
            height: 100%;
            width: 0%;
            transition: width 0.1s linear;
        }

        .time-info { display: flex; justify-content: space-between; color: rgba(155, 77, 255, 0.7); font-size: 10px; }
        .music-controls { display: flex; justify-content: center; align-items: center; gap: 14px; margin-top: 6px; }

        .control-btn {
            background: rgba(155, 77, 255, 0.15);
            border: none;
            border-radius: 50%;
            width: 34px;
            height: 34px;
            cursor: pointer;
            color: #d9d0e6;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn.play-btn {
            background: linear-gradient(135deg, #9b4dff, #6a1b9a);
            width: 44px;
            height: 44px;
        }

        .modal-content {
            border: none;
            border-radius: 20px;
            background: #120e1c;
            color: #d9d0e6;
            border: 1px solid #2a1f40;
        }

        .modal-header { border-bottom: 1px solid #2a1f40; }
        .modal-footer { border-top: 1px solid #2a1f40; }
        .modal-header .btn-close { filter: invert(1); }

        .api-endpoint-box {
            background: rgba(0,0,0,0.3);
            padding: 14px;
            border-radius: 12px;
            font-family: monospace;
            font-size: 13px;
            color: #c9b0ff;
            word-break: break-all;
            margin-bottom: 20px;
            border: 1px solid #2a1f40;
        }

        .live-url-box {
            background: rgba(0,0,0,0.3);
            padding: 14px 16px;
            border-radius: 12px;
            font-family: monospace;
            font-size: 13px;
            color: #9b4dff;
            word-break: break-all;
            margin-bottom: 20px;
            border: 1px solid #2a1f40;
            display: flex;
            align-items: center;
        }

        .param-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #2a1f40;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 12px;
            background: rgba(0,0,0,0.3);
            color: #d9d0e6;
        }

        .param-input:focus { outline: none; border-color: #9b4dff; }

        .response-box {
            background: rgba(0,0,0,0.3);
            border: 1px solid #2a1f40;
            color: #c9b0ff;
            border-radius: 12px;
            padding: 16px;
            font-family: monospace;
            font-size: 12px;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: 400px;
            overflow-y: auto;
        }

        .submit-btn {
            background: linear-gradient(135deg, #9b4dff, #6a1b9a);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .submit-btn:hover { background: linear-gradient(135deg, #b87aff, #8a2be2); }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .status-card {
            background: rgba(18, 14, 28, 0.8);
            border: 1px solid #2a1f40;
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s ease;
        }

        .status-card:hover { border-color: #9b4dff; transform: translateY(-3px); }

        .status-indicator {
            width: 10px;
            height: 10px;
            background: #10b981;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.5);
        }

        .status-card-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #6b5b85;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .status-card-value { font-size: 20px; font-weight: 700; color: #d9d0e6; }

        @media (max-width: 768px) {
            .hero-title { font-size: 34px; }
            .main-content { padding: 20px 16px; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .features-grid { grid-template-columns: 1fr; }
            .endpoints-grid { grid-template-columns: 1fr; }
            .music-player { width: 260px; }
        }
    </style>
</head>
<body>
    <div id="loadingScreen">
        <div class="spinner"></div>
        <p style="margin-top: 16px; font-weight: 500; color: #988ab3;">Cargando API DE EL VIGILANTE</p>
    </div>

    <div id="authScreen">
        <div class="auth-card">
            <img src="https://files.catbox.moe/0tha19.png" alt="El Vigilante" class="auth-logo">
            <div class="auth-title">API DE EL VIGILANTE</div>
            <div class="auth-subtitle">Plan Pro · Acceso Exclusivo</div>
            <div class="auth-form" id="authFormContainer"></div>
        </div>
    </div>

    <div class="music-player" id="musicPlayer">
        <div class="music-header">
            <span class="music-title">🎵 ACENTO · QUINTO REAL</span>
            <button class="music-toggle-min" id="toggleMinimize" style="background:none;border:none;color:#d9d0e6;cursor:pointer;">−</button>
        </div>
        <div class="music-info">
            <div class="song-name" id="songName">Una vaina loca</div>
            <div class="artist-name" id="artistName">Acento Quinto Real</div>
        </div>
        <div class="progress-container" id="progressContainer">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="time-info">
            <span id="currentTime">0:00</span>
            <span id="duration">0:00</span>
        </div>
        <div class="music-controls">
            <button class="control-btn" id="prevBtn"><i class="fas fa-backward"></i></button>
            <button class="control-btn play-btn" id="playPauseBtn"><i class="fas fa-play"></i></button>
            <button class="control-btn" id="nextBtn"><i class="fas fa-forward"></i></button>
        </div>
    </div>
    <audio id="audioPlayer"></audio>

    <div class="top-bar" id="topBar" style="display: none;">
        <div class="top-bar-left">
            <button class="menu-toggle" id="menuToggle"><span></span><span></span><span></span></button>
            <div class="api-name" id="apiName">EL VIGILANTE</div>
            <span class="pro-badge">PRO</span>
        </div>
        <div class="user-section" id="userSection"></div>
    </div>

    <div class="sidebar-overlay" id="sidebarOverlay" style="display: none;"></div>
    <div class="sidebar" id="sidebar" style="display: none;">
        <div class="sidebar-nav">
            <div class="sidebar-item active" data-page="home"><i class="fas fa-home"></i> Dashboard</div>
            <div class="sidebar-item" data-page="status"><i class="fas fa-chart-line"></i> Estado</div>
            <div class="sidebar-category">Categorías</div>
            <div id="categoriesNav"></div>
            <div class="sidebar-item" data-page="all"><i class="fas fa-cubes"></i> Todos los endpoints</div>
        </div>
    </div>

    <div class="main-content" id="mainContent" style="display: none;"></div>

    <div class="footer" id="footer" style="display: none;">
        <p id="footerText">🛡️ API DE EL VIGILANTE · Plan Pro · Música: Acento Quinto Real</p>
    </div>

    <!-- Modal para endpoints -->
    <div class="modal fade" id="apiModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <div>
                        <h5 class="modal-title" id="modalTitle"></h5>
                        <p id="modalDesc" style="font-size:13px;color:#988ab3;"></p>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="api-endpoint-box" id="endpointBox" style="display: none;"></div>
                    <div class="live-url-box" id="liveUrlBox" style="display: none;">
                        <i class="fas fa-link me-2"></i> <span id="liveUrlText"></span>
                    </div>
                    <div id="paramsContainer"></div>
                    <div id="loadingContainer" style="display: none; text-align: center; padding: 40px;">
                        <div class="spinner"></div>
                    </div>
                    <div id="responseContainer"></div>
                </div>
                <div class="modal-footer">
                    <button class="submit-btn" id="submitBtn" style="display: none;">Enviar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ==================== REPRODUCTOR DE MÚSICA ====================
        const playlist = [
            { name: "Acento Quinto Real", artist: "Acento Quinto Real", url: "https://files.catbox.moe/65kqmi.mp3" },
            { name: "Una vaina loca", artist: "Acento Quinto Real", url: "https://files.catbox.moe/g2zd2z.mp3" }
        ];
        let currentSongIndex = 0, isPlaying = false, isMinimized = false;
        const audioEl = document.getElementById('audioPlayer');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const songNameEl = document.getElementById('songName');
        const artistNameEl = document.getElementById('artistName');
        const progressBar = document.getElementById('progressBar');
        const progressContainer = document.getElementById('progressContainer');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const musicPlayerDiv = document.getElementById('musicPlayer');

        function loadSong(index) {
            const song = playlist[index];
            songNameEl.textContent = song.name;
            artistNameEl.textContent = song.artist;
            audioEl.src = song.url;
            audioEl.load();
            if(isPlaying) audioEl.play().catch(e => console.log(e));
            updatePlayIcon();
        }

        function updatePlayIcon() {
            playPauseBtn.querySelector('i').className = isPlaying ? 'fas fa-pause' : 'fas fa-play';
        }

        function playPauseSong() {
            if (isPlaying) {
                audioEl.pause();
            } else {
                audioEl.play().catch(e => console.log(e));
            }
            isPlaying = !isPlaying;
            updatePlayIcon();
        }

        function nextSong() {
            currentSongIndex = (currentSongIndex + 1) % playlist.length;
            loadSong(currentSongIndex);
            if (!isPlaying) playPauseSong();
        }

        function prevSong() {
            currentSongIndex = (currentSongIndex - 1 + playlist.length) % playlist.length;
            loadSong(currentSongIndex);
            if (!isPlaying) playPauseSong();
        }

        function updateProgress() {
            if (audioEl.duration && !isNaN(audioEl.duration)) {
                progressBar.style.width = `${(audioEl.currentTime / audioEl.duration) * 100}%`;
                currentTimeEl.textContent = formatTime(audioEl.currentTime);
                durationEl.textContent = formatTime(audioEl.duration);
            }
        }

        function formatTime(s) {
            if (isNaN(s)) return "0:00";
            const m = Math.floor(s / 60);
            const seg = Math.floor(s % 60);
            return `${m}:${seg.toString().padStart(2, '0')}`;
        }

        function setProgress(e) {
            const rect = progressContainer.getBoundingClientRect();
            audioEl.currentTime = ((e.clientX - rect.left) / rect.width) * audioEl.duration;
        }

        function toggleMinimizePlayer() {
            isMinimized = !isMinimized;
            musicPlayerDiv.classList.toggle('minimized');
            document.getElementById('toggleMinimize').textContent = isMinimized ? '+' : '−';
        }

        playPauseBtn.onclick = playPauseSong;
        document.getElementById('nextBtn').onclick = nextSong;
        document.getElementById('prevBtn').onclick = prevSong;
        audioEl.ontimeupdate = updateProgress;
        audioEl.onended = nextSong;
        progressContainer.onclick = setProgress;
        document.getElementById('toggleMinimize').onclick = toggleMinimizePlayer;
        loadSong(0);

        // ==================== AUTENTICACIÓN ====================
        const INVITE_CODE = "elvigilante";

        function getUsers() {
            return JSON.parse(localStorage.getItem('vigilanteUsers') || '[]');
        }

        function saveUsers(users) {
            localStorage.setItem('vigilanteUsers', JSON.stringify(users));
        }

        function getCurrentUser() {
            return JSON.parse(localStorage.getItem('vigilanteCurrentUser') || 'null');
        }

        function setCurrentUser(user) {
            localStorage.setItem('vigilanteCurrentUser', JSON.stringify(user));
        }

        function showMainInterface() {
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('topBar').style.display = 'flex';
            document.getElementById('sidebar').style.display = '';
            document.getElementById('mainContent').style.display = '';
            document.getElementById('footer').style.display = '';
            document.getElementById('sidebarOverlay').style.display = '';
            updateUserUI();
            renderPage('home');
        }

        function showAuthScreen(view = 'login') {
            document.getElementById('authScreen').style.display = 'flex';
            document.getElementById('topBar').style.display = 'none';
            document.getElementById('sidebar').style.display = 'none';
            document.getElementById('mainContent').style.display = 'none';
            document.getElementById('footer').style.display = 'none';
            document.getElementById('sidebarOverlay').style.display = 'none';
            renderAuthForm(view);
        }

        function logout() {
            localStorage.removeItem('vigilanteCurrentUser');
            showAuthScreen('login');
        }

        function updateUserUI() {
            const userSection = document.getElementById('userSection');
            const currentUser = getCurrentUser();
            if (currentUser) {
                userSection.innerHTML = `
                    <span style="color:#c9b0ff; font-weight:500; font-size:13px;">
                        <i class="fas fa-user-circle me-1"></i> ${currentUser.username}
                    </span>
                    <button class="logout-btn" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i> Salir
                    </button>
                `;
            }
        }

        function renderAuthForm(view) {
            const container = document.getElementById('authFormContainer');
            if (view === 'login') {
                container.innerHTML = `
                    <input type="text" id="loginUsername" placeholder="Usuario">
                    <input type="password" id="loginPassword" placeholder="Contraseña">
                    <button class="auth-btn" onclick="login()">Iniciar sesión</button>
                    <div class="auth-divider">¿No tienes cuenta?</div>
                    <a class="auth-link" onclick="showAuthScreen('register')">Crear una cuenta</a>
                `;
            } else {
                container.innerHTML = `
                    <input type="text" id="regUsername" placeholder="Usuario">
                    <input type="password" id="regPassword" placeholder="Contraseña">
                    <input type="text" id="regCode" placeholder="Código de invitación">
                    <button class="auth-btn" onclick="register()">Crear cuenta</button>
                    <div class="auth-divider">¿Ya tienes cuenta?</div>
                    <a class="auth-link" onclick="showAuthScreen('login')">Iniciar sesión</a>
                `;
            }
        }

        function login() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            if (!username || !password) return alert('Completa todos los campos');
            const users = getUsers();
            const user = users.find(u => u.username === username && u.password === password);
            if (user) {
                setCurrentUser({ username: user.username });
                showMainInterface();
            } else {
                alert('Credenciales incorrectas');
            }
        }

        function register() {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value.trim();
            const code = document.getElementById('regCode').value.trim();
            if (!username || !password || !code) return alert('Completa todos los campos');
            if (code !== INVITE_CODE) return alert('Código de invitación inválido. Necesitas el código correcto.');
            const users = getUsers();
            if (users.find(u => u.username === username)) return alert('El usuario ya existe');
            users.push({ username, password });
            saveUsers(users);
            setCurrentUser({ username });
            showMainInterface();
            alert('Cuenta creada exitosamente. ¡Bienvenido al Plan Pro!');
        }

        // ==================== CONFIGURACIÓN Y DASHBOARD ====================
        let settings = {
            name: "EL VIGILANTE",
            version: "v2.0 · Plan Pro",
            description: "API profesional con endpoints exclusivos.",
            apiSettings: { creator: "El Vigilante" },
            header: { imageSrc: ["https://files.catbox.moe/0tha19.png"] },
            categories: []
        };

        async function loadSettings() {
            try {
                const response = await fetch('/src/settings.json');
                if (response.ok) {
                    const data = await response.json();
                    settings = data;
                    console.log('✅ Settings cargados correctamente:', settings);
                } else {
                    console.warn('⚠️ No se pudo cargar settings.json, usando configuración por defecto');
                }
            } catch (e) {
                console.warn('⚠️ Error al cargar settings.json:', e.message);
                // Mantener configuración por defecto
                settings.categories = [
                    { name: "Usuarios", items: [{ name: "Perfil", path: "/api/user", desc: "Obtener perfil de usuario", innerDesc: "Devuelve datos del perfil del usuario autenticado" }] },
                    { name: "Contenido", items: [{ name: "Feed", path: "/api/feed", desc: "Feed dinámico de contenido", innerDesc: "Obtiene las últimas publicaciones" }] },
                    { name: "Búsqueda", items: [{ name: "YouTube Search", path: "/search/youtube?q=", desc: "Buscar videos en YouTube", innerDesc: "Ejemplo: Goku Black" }] },
                    { name: "Música", items: [{ name: "Canción actual", path: "/api/song", desc: "Información de la canción actual", innerDesc: "Devuelve los datos de la canción que suena actualmente" }] }
                ];
            }
            
            // Actualizar UI con los settings cargados
            document.getElementById('apiName').textContent = settings.name || "EL VIGILANTE";
            document.getElementById('footerText').innerHTML = `🛡️ ${settings.name || 'API DE EL VIGILANTE'} · Plan Pro · Música: Acento Quinto Real`;
            
            // Cargar categorías en el sidebar
            loadCategories();
        }

        function loadCategories() {
            const categoriesNav = document.getElementById('categoriesNav');
            categoriesNav.innerHTML = '';
            
            if (settings.categories && settings.categories.length > 0) {
                settings.categories.forEach(cat => {
                    const div = document.createElement('div');
                    div.className = 'sidebar-item';
                    div.dataset.page = 'category';
                    div.dataset.category = cat.name;
                    div.innerHTML = `<i class="fas fa-folder"></i> ${cat.name}`;
                    categoriesNav.appendChild(div);
                });
            }
        }

        function getTotalEndpoints() {
            let total = 0;
            if (settings.categories) {
                settings.categories.forEach(cat => {
                    total += cat.items ? cat.items.length : 0;
                });
            }
            return total;
        }

        function initUI() {
            const menuToggle = document.getElementById('menuToggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            
            menuToggle.onclick = () => {
                menuToggle.classList.toggle('active');
                sidebar.classList.toggle('active');
                overlay.classList.toggle('active');
            };
            
            overlay.onclick = () => {
                menuToggle.classList.remove('active');
                sidebar.classList.remove('active');
                overlay.classList.remove('active');
            };
            
            // Re-attach sidebar events después de cargar categorías
            attachSidebarEvents();
        }

        function attachSidebarEvents() {
            document.querySelectorAll('.sidebar-item').forEach(item => {
                item.onclick = function() {
                    document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
                    this.classList.add('active');
                    const page = this.dataset.page;
                    const cat = this.dataset.category;
                    
                    if (page === 'category' && cat) {
                        renderPage('category', cat);
                    } else {
                        renderPage(page);
                    }
                    
                    // Cerrar sidebar en móvil
                    document.getElementById('menuToggle').classList.remove('active');
                    document.getElementById('sidebar').classList.remove('active');
                    document.getElementById('sidebarOverlay').classList.remove('active');
                };
            });
        }

        function renderPage(page, category = null) {
            const container = document.getElementById('mainContent');
            
            if (page === 'home') {
                const imgSrc = settings.header?.imageSrc?.[0] || 'https://files.catbox.moe/0tha19.png';
                container.innerHTML = `
                    <div class="hero-section">
                        <img src="${imgSrc}" alt="EL VIGILANTE" class="hero-image">
                        <h1 class="hero-title">API DE EL VIGILANTE</h1>
                        <p class="hero-subtitle">${settings.description || 'API profesional con endpoints exclusivos.'}</p>
                        <div class="hero-version">
                            <i class="fas fa-crown" style="color:#fbbf24;"></i> ${settings.version || 'v2.0 · Plan Pro'}
                        </div>
                    </div>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-code"></i></div>
                            <div class="stat-number">${getTotalEndpoints()}</div>
                            <div class="stat-label">Endpoints</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-layer-group"></i></div>
                            <div class="stat-number">${settings.categories?.length || 0}</div>
                            <div class="stat-label">Categorías</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-music"></i></div>
                            <div class="stat-number">24/7</div>
                            <div class="stat-label">Música Activa</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-shield-haltered"></i></div>
                            <div class="stat-number">PRO</div>
                            <div class="stat-label">Plan Actual</div>
                        </div>
                    </div>
                    <div class="features-grid">
                        <div class="feature-card">
                            <div class="feature-icon"><i class="fas fa-bolt"></i></div>
                            <div class="feature-title">Rendimiento Óptimo</div>
                            <div class="feature-desc">API de alta velocidad con respuestas en milisegundos.</div>
                        </div>
                        <div class="feature-card">
                            <div class="feature-icon"><i class="fas fa-lock"></i></div>
                            <div class="feature-title">Acceso Exclusivo</div>
                            <div class="feature-desc">Solo usuarios con código de invitación pueden acceder.</div>
                        </div>
                        <div class="feature-card">
                            <div class="feature-icon"><i class="fas fa-headphones"></i></div>
                            <div class="feature-title">Música Integrada</div>
                            <div class="feature-desc">Reproductor de Acento Quinto Real integrado.</div>
                        </div>
                        <div class="feature-card">
                            <div class="feature-icon"><i class="fas fa-chart-bar"></i></div>
                            <div class="feature-title">Estadísticas en Vivo</div>
                            <div class="feature-desc">Monitoreo en tiempo real de los servicios.</div>
                        </div>
                    </div>
                `;
            } else if (page === 'status') {
                container.innerHTML = `
                    <div class="page-header">
                        <div class="page-title">Estado del Sistema</div>
                        <div class="page-subtitle">Monitoreo en tiempo real de los servicios</div>
                    </div>
                    <div class="status-grid">
                        <div class="status-card">
                            <div class="status-card-title">API Status</div>
                            <div class="status-card-value"><span class="status-indicator"></span> Online</div>
                        </div>
                        <div class="status-card">
                            <div class="status-card-title">Versión</div>
                            <div class="status-card-value">${settings.version || 'v2.0'}</div>
                        </div>
                        <div class="status-card">
                            <div class="status-card-title">Endpoints Totales</div>
                            <div class="status-card-value">${getTotalEndpoints()}</div>
                        </div>
                        <div class="status-card">
                            <div class="status-card-title">Música Activa</div>
                            <div class="status-card-value" style="color:#9b4dff;">🎵 Una vaina loca</div>
                        </div>
                    </div>
                `;
            } else if (page === 'category' && category) {
                const cat = settings.categories.find(c => c.name === category);
                if (!cat) return;
                
                container.innerHTML = `
                    <div class="page-header">
                        <div class="page-title"><i class="fas fa-folder-open me-2" style="color:#9b4dff;"></i> ${cat.name}</div>
                        <div class="page-subtitle">${cat.items.length} endpoints disponibles</div>
                    </div>
                    <input type="text" class="search-input" placeholder="🔍 Buscar endpoints en ${cat.name}..." id="searchInput">
                    <div class="endpoints-grid">
                        ${cat.items.map(item => `
                            <div class="endpoint-card" data-name="${item.name.toLowerCase()}">
                                <div>
                                    <div class="endpoint-method">GET</div>
                                    <div class="endpoint-name">${item.name}</div>
                                    <div class="endpoint-desc">${item.desc}</div>
                                </div>
                                <button class="endpoint-btn" data-path="${item.path}" data-name="${item.name}" data-desc="${item.desc}" data-inner="${item.innerDesc || ''}">
                                    Probar <i class="fas fa-arrow-right"></i>
                                </button>
                            </div>
                        `).join('')}
                    </div>
                `;
                setupSearch();
                attachEndpointEvents();
            } else if (page === 'all') {
                container.innerHTML = `
                    <div class="page-header">
                        <div class="page-title">Todos los Endpoints</div>
                        <div class="page-subtitle">${getTotalEndpoints()} endpoints en ${settings.categories?.length || 0} categorías</div>
                    </div>
                    <input type="text" class="search-input" placeholder="🔍 Buscar entre todos los endpoints..." id="searchInput">
                    <div id="allCategoriesContainer">
                        ${settings.categories.map(cat => `
                            <div class="category-section" style="margin-bottom:32px;">
                                <h3 style="color:#c9b0ff; font-size:18px; font-weight:700; margin-bottom:16px;">
                                    <i class="fas fa-folder me-2" style="color:#9b4dff;"></i> ${cat.name}
                                </h3>
                                <div class="endpoints-grid">
                                    ${cat.items.map(item => `
                                        <div class="endpoint-card" data-name="${item.name.toLowerCase()}">
                                            <div>
                                                <div class="endpoint-method">GET</div>
                                                <div class="endpoint-name">${item.name}</div>
                                                <div class="endpoint-desc">${item.desc}</div>
                                            </div>
                                            <button class="endpoint-btn" data-path="${item.path}" data-name="${item.name}" data-desc="${item.desc}" data-inner="${item.innerDesc || ''}">
                                                Probar <i class="fas fa-arrow-right"></i>
                                            </button>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                setupSearch();
                attachEndpointEvents();
            }
        }

        function setupSearch() {
            const searchInput = document.getElementById('searchInput');
            if (!searchInput) return;
            
            searchInput.oninput = function(e) {
                const term = e.target.value.toLowerCase();
                document.querySelectorAll('.endpoint-card').forEach(card => {
                    card.style.display = card.dataset.name.includes(term) ? '' : 'none';
                });
            };
        }

        function attachEndpointEvents() {
            document.querySelectorAll('.endpoint-btn').forEach(btn => {
                btn.onclick = function() {
                    openModal(this.dataset.path, this.dataset.name, this.dataset.desc, this.dataset.inner);
                };
            });
        }

        function openModal(path, name, desc, innerDesc) {
            const modal = new bootstrap.Modal(document.getElementById('apiModal'));
            document.getElementById('modalTitle').textContent = name;
            document.getElementById('modalDesc').textContent = desc;
            
            const urlParts = path.split('?');
            const basePath = urlParts[0];
            const existingParams = new URLSearchParams(urlParts[1] || '');
            const baseUrl = window.location.origin + basePath;
            
            document.getElementById('endpointBox').style.display = 'block';
            document.getElementById('endpointBox').innerHTML = `<code>${baseUrl}</code>`;
            
            const liveUrlBox = document.getElementById('liveUrlBox');
            const liveUrlText = document.getElementById('liveUrlText');
            liveUrlBox.style.display = 'flex';
            liveUrlText.textContent = baseUrl;
            
            document.getElementById('paramsContainer').innerHTML = '';
            document.getElementById('responseContainer').innerHTML = '';
            document.getElementById('submitBtn').style.display = 'none';
            document.getElementById('loadingContainer').style.display = 'none';
            
            const hasParams = existingParams.keys().next().done === false;
            
            if (hasParams) {
                for (let [k, v] of existingParams) {
                    const inp = document.createElement('input');
                    inp.type = 'text';
                    inp.className = 'param-input';
                    inp.placeholder = `${k} (ej: ${v || 'valor'})`;
                    inp.dataset.param = k;
                    document.getElementById('paramsContainer').appendChild(inp);
                }
                
                if (innerDesc) {
                    document.getElementById('paramsContainer').innerHTML += `
                        <div style="color:#988ab3; font-size:12px; margin-bottom:12px;">
                            <i class="fas fa-info-circle me-1" style="color:#9b4dff;"></i> ${innerDesc}
                        </div>
                    `;
                }
                
                document.getElementById('submitBtn').style.display = 'inline-flex';
                document.getElementById('submitBtn').onclick = async function() {
                    const params = new URLSearchParams();
                    document.querySelectorAll('#paramsContainer .param-input').forEach(inp => {
                        if (inp.value.trim()) params.append(inp.dataset.param, inp.value.trim());
                    });
                    
                    let finalUrl = baseUrl;
                    const pstr = params.toString();
                    if (pstr) finalUrl += '?' + pstr;
                    
                    document.getElementById('loadingContainer').style.display = 'block';
                    document.getElementById('responseContainer').innerHTML = '';
                    
                    try {
                        const resp = await fetch(finalUrl);
                        const ct = resp.headers.get('Content-Type');
                        if (ct && ct.startsWith('image/')) {
                            const blob = await resp.blob();
                            const img = document.createElement('img');
                            img.src = URL.createObjectURL(blob);
                            img.className = 'w-100 mt-2 rounded';
                            document.getElementById('responseContainer').appendChild(img);
                        } else {
                            const data = await resp.json();
                            document.getElementById('responseContainer').innerHTML = `
                                <pre class="response-box">${JSON.stringify(data, null, 2)}</pre>
                            `;
                        }
                    } catch (e) {
                        document.getElementById('responseContainer').innerHTML = `
                            <pre class="response-box" style="color:#ef4444;">Error: ${e.message}</pre>
                        `;
                    }
                    
                    document.getElementById('loadingContainer').style.display = 'none';
                };
            } else {
                // Cargar automáticamente
                document.getElementById('loadingContainer').style.display = 'block';
                fetch(baseUrl)
                    .then(async resp => {
                        const ct = resp.headers.get('Content-Type');
                        if (ct && ct.startsWith('image/')) {
                            const blob = await resp.blob();
                            const img = document.createElement('img');
                            img.src = URL.createObjectURL(blob);
                            img.className = 'w-100 mt-2 rounded';
                            document.getElementById('responseContainer').appendChild(img);
                        } else {
                            const data = await resp.json();
                            document.getElementById('responseContainer').innerHTML = `
                                <pre class="response-box">${JSON.stringify(data, null, 2)}</pre>
                            `;
                        }
                    })
                    .catch(e => {
                        document.getElementById('responseContainer').innerHTML = `
                            <pre class="response-box" style="color:#ef4444;">Error: ${e.message}</pre>
                        `;
                    })
                    .finally(() => {
                        document.getElementById('loadingContainer').style.display = 'none';
                    });
            }
            
            modal.show();
        }

        async function start() {
            await loadSettings();
            initUI();
            
            const currentUser = getCurrentUser();
            if (currentUser) {
                showMainInterface();
            } else {
                showAuthScreen('login');
            }
            
            const loading = document.getElementById('loadingScreen');
            loading.style.opacity = '0';
            setTimeout(() => { loading.style.display = 'none'; }, 500);
        }

        start();
    </script>
</body>
