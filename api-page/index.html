<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
    <title>API DE EL VIGILANTE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg: #0a0a0a; --bg2: #111111; --card: #1a1a1a;
            --border: #2a2a2a; --text: #e4e4e7; --text2: #a1a1aa;
            --primary: #6c5ce7; --primary-light: rgba(108,92,231,0.1);
            --danger: #ef4444; --success: #10b981;
            --shadow: 0 1px 3px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 6px rgba(0,0,0,0.4);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; }

        #authScreen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        #authScreen.hidden { display: none; }
        .auth-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 40px; width: 100%; max-width: 420px; text-align: center; box-shadow: var(--shadow-md); }
        .auth-card img { width: 72px; height: 72px; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary); margin-bottom: 16px; }
        .auth-card h2 { font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 20px; }
        .auth-card .inp { width: 100%; padding: 12px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 14px; outline: none; margin-bottom: 12px; transition: all 0.2s; }
        .auth-card .inp:focus { border-color: var(--primary); }
        .btn { padding: 12px 20px; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background: var(--primary); color: #fff; width: 100%; } .btn-primary:hover { background: #7c6cf0; }
        .auth-error, .auth-ok { padding: 8px 12px; border-radius: 8px; font-size: 12px; margin-bottom: 10px; display: none; }
        .auth-error { background: rgba(239,68,68,0.1); color: #fca5a5; } .auth-ok { background: rgba(16,185,129,0.1); color: #6ee7b7; }
        .auth-toggle { color: var(--primary); cursor: pointer; font-size: 13px; margin-top: 14px; } .auth-toggle:hover { text-decoration: underline; }

        #appContainer { display: none; width: 100%; } #appContainer.show { display: flex; }
        .sidebar { width: 240px; min-height: 100vh; background: var(--bg2); border-right: 1px solid var(--border); padding: 20px 0; position: sticky; top: 0; flex-shrink: 0; }
        .sidebar-logo { padding: 0 20px 24px; font-size: 18px; font-weight: 700; color: var(--primary); }
        .sidebar-logo img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; margin-right: 8px; vertical-align: middle; }
        .sidebar-nav { padding: 0 12px; }
        .sidebar-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text2); transition: all 0.15s; margin-bottom: 2px; }
        .sidebar-item:hover { background: var(--primary-light); color: var(--primary); }
        .sidebar-item.active { background: var(--primary-light); color: var(--primary); font-weight: 600; }
        .sidebar-divider { padding: 16px 14px 8px; font-size: 10px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; }

        .main-panel { flex: 1; display: flex; flex-direction: column; }
        .header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .header-title { font-size: 16px; font-weight: 600; }
        .header-avatar { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; cursor: pointer; }
        .logout-btn { background: rgba(239,68,68,0.1); color: #fca5a5; border: none; padding: 8px 16px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; } .logout-btn:hover { background: rgba(239,68,68,0.2); }

        .content { padding: 24px; flex: 1; }
        .page-title { font-size: 22px; font-weight: 700; margin-bottom: 20px; }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; margin-bottom: 28px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; box-shadow: var(--shadow); transition: all 0.2s; display: flex; flex-direction: column; cursor: pointer; }
        .card:hover { box-shadow: var(--shadow-md); border-color: var(--primary); }
        .card-badge { display: inline-block; background: var(--primary-light); color: var(--primary); padding: 3px 10px; border-radius: 6px; font-size: 10px; font-weight: 600; margin-bottom: 10px; width: fit-content; }
        .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .card-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; background: var(--primary-light); color: var(--primary); flex-shrink: 0; }
        .card-title { font-size: 15px; font-weight: 600; }
        .card-desc { font-size: 12px; color: var(--text2); margin-bottom: 14px; flex: 1; }
        .card .btn-probar { width: 100%; padding: 12px; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: auto; }
        .card .btn-probar:hover { background: #7c6cf0; }

        .stats-row { display: flex; gap: 16px; margin-bottom: 28px; flex-wrap: wrap; }
        .stat-box { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; text-align: center; flex: 1; min-width: 130px; box-shadow: var(--shadow); }
        .stat-num { font-size: 28px; font-weight: 700; color: var(--primary); }
        .stat-lbl { font-size: 11px; color: var(--text2); margin-top: 4px; text-transform: uppercase; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: none; align-items: center; justify-content: center; }
        .modal-overlay.show { display: flex; }
        .modal-box { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 28px; width: 90%; max-width: 650px; max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
        .modal-box h3 { font-size: 18px; font-weight: 600; margin-bottom: 6px; color: var(--primary); }
        .modal-box .badge { display: inline-block; background: var(--primary-light); color: var(--primary); padding: 3px 10px; border-radius: 6px; font-size: 10px; font-weight: 600; margin-bottom: 12px; }
        .modal-box .inp { width: 100%; padding: 12px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; outline: none; margin-bottom: 10px; }
        .modal-box .inp:focus { border-color: var(--primary); }
        .modal-box .live-url { background: #000; color: var(--primary); font-family: monospace; padding: 10px 14px; border-radius: 8px; font-size: 12px; word-break: break-all; margin-bottom: 10px; }
        .modal-box .response { background: #000; color: #10b981; font-family: monospace; padding: 14px; border-radius: 8px; font-size: 11px; max-height: 250px; overflow-y: auto; white-space: pre-wrap; margin-top: 10px; }
        .modal-box .btn { padding: 10px 20px; font-size: 14px; }

        @media (max-width: 768px) { .sidebar { display: none; } .card-grid { grid-template-columns: 1fr; } .stats-row { flex-direction: column; } }
    </style>
</head>
<body>

<div id="authScreen"><div class="auth-card" id="authCard"></div></div>

<div id="appContainer">
    <aside class="sidebar">
        <div class="sidebar-logo"><img src="https://files.catbox.moe/0tha19.png" alt=""> API VIGILANTE</div>
        <div class="sidebar-nav">
            <div class="sidebar-item active" data-page="home"><i class="fas fa-home"></i> Inicio</div>
            <div class="sidebar-item" data-page="status"><i class="fas fa-chart-bar"></i> Estado</div>
            <div class="sidebar-divider">Categorías</div>
            <div id="categoriesNav"></div>
            <div class="sidebar-item" data-page="all"><i class="fas fa-layer-group"></i> Todos</div>
        </div>
    </aside>
    <div class="main-panel">
        <header class="header">
            <div class="header-left"><span class="header-title" id="headerTitle">Inicio</span></div>
            <div style="display:flex;align-items:center;gap:12px;">
                <img src="https://files.catbox.moe/0tha19.png" class="header-avatar" alt="Avatar">
                <button class="logout-btn" onclick="cerrarSesion()">Salir</button>
            </div>
        </header>
        <div class="content" id="mainContent"></div>
    </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)this.classList.remove('show')">
    <div class="modal-box" id="modalBox"></div>
</div>

<script>
const CODIGO_SECRETO = 'elvigilante'; let modo = 'login', settings = { name: "API DE EL VIGILANTE", version: "v1.0", categories: [] };
const BASE_URL = 'https://api-de-el-vigilante-8jnf.onrender.com';

function renderAuth() {
    const card = document.getElementById('authCard');
    if (modo === 'login') {
        card.innerHTML = `<img src="https://files.catbox.moe/0tha19.png" alt="Logo"><h2>Iniciar Sesión</h2><div class="auth-error" id="authError"></div><input type="text" id="authUser" class="inp" placeholder="Usuario o Email"><input type="password" id="authPass" class="inp" placeholder="Contraseña"><button class="btn btn-primary" onclick="login()">Entrar</button><p class="auth-toggle" onclick="modo='register';renderAuth();">¿No tienes cuenta? Regístrate</p>`;
    } else {
        card.innerHTML = `<img src="https://files.catbox.moe/0tha19.png" alt="Logo"><h2>Registro</h2><div class="auth-error" id="authError"></div><div class="auth-ok" id="authOk"></div><input type="text" id="regUser" class="inp" placeholder="Usuario (mín. 3)"><input type="email" id="regEmail" class="inp" placeholder="Email"><input type="password" id="regPass" class="inp" placeholder="Contraseña (mín. 6)"><input type="text" id="regCode" class="inp" placeholder="Código de invitación"><button class="btn btn-primary" onclick="register()">Crear cuenta</button><p class="auth-toggle" onclick="modo='login';renderAuth();">¿Ya tienes cuenta? Inicia sesión</p>`;
    }
}
function login(){const u=document.getElementById('authUser').value.trim(),p=document.getElementById('authPass').value.trim(),e=document.getElementById('authError');if(!u||!p){e.textContent='Completa todos los campos';e.style.display='block';return;}const users=JSON.parse(localStorage.getItem('vigilante_users')||'[]'),f=users.find(x=>(x.username===u||x.email===u)&&x.password===p);if(f){localStorage.setItem('vigilante_session',JSON.stringify(f));entrar();}else{e.textContent='Usuario o contraseña incorrectos';e.style.display='block';}}
function register(){const u=document.getElementById('regUser').value.trim(),em=document.getElementById('regEmail').value.trim(),p=document.getElementById('regPass').value.trim(),c=document.getElementById('regCode').value.trim(),er=document.getElementById('authError'),ok=document.getElementById('authOk');er.style.display='none';ok.style.display='none';if(!u||!em||!p||!c){er.textContent='Completa todos los campos';er.style.display='block';return;}if(u.length<3){er.textContent='Usuario mínimo 3 caracteres';er.style.display='block';return;}if(!em.includes('@')){er.textContent='Email no válido';er.style.display='block';return;}if(p.length<6){er.textContent='Contraseña mínimo 6 caracteres';er.style.display='block';return;}if(c!==CODIGO_SECRETO){er.textContent='Código de invitación incorrecto';er.style.display='block';return;}const users=JSON.parse(localStorage.getItem('vigilante_users')||'[]');if(users.find(x=>x.username===u)){er.textContent='El usuario ya existe';er.style.display='block';return;}if(users.find(x=>x.email===em)){er.textContent='El email ya está registrado';er.style.display='block';return;}const nuevo={username:u,email:em,password:p,fecha:new Date().toISOString()};users.push(nuevo);localStorage.setItem('vigilante_users',JSON.stringify(users));localStorage.setItem('vigilante_session',JSON.stringify(nuevo));ok.textContent='✅ Cuenta creada. Entrando...';ok.style.display='block';setTimeout(entrar,800);}
function entrar(){document.getElementById('authScreen').classList.add('hidden');document.getElementById('appContainer').classList.add('show');cargarSettings();}
function cerrarSesion(){localStorage.removeItem('vigilante_session');document.getElementById('authScreen').classList.remove('hidden');document.getElementById('appContainer').classList.remove('show');renderAuth();}

async function cargarSettings(){
    try{const r=await fetch('/src/settings.json');if(r.ok)settings=await r.json();}catch(e){}
    document.getElementById('headerTitle').textContent=settings.name||'API DE EL VIGILANTE';
    const nav=document.getElementById('categoriesNav');
    nav.innerHTML='';
    if(settings.categories)settings.categories.forEach(c=>{const d=document.createElement('div');d.className='sidebar-item';d.dataset.page='category';d.dataset.category=c.name;d.innerHTML='<i class="fas fa-folder"></i> '+c.name;nav.appendChild(d);});
    initSidebar();renderHome();
}
function initSidebar(){document.querySelectorAll('.sidebar-item').forEach(i=>{i.onclick=()=>{document.querySelectorAll('.sidebar-item').forEach(x=>x.classList.remove('active'));i.classList.add('active');const p=i.dataset.page,c=i.dataset.category;if(p==='category')renderCategory(c);else if(p==='home')renderHome();else if(p==='status')renderStatus();else if(p==='all')renderAll();};});}

function renderHome(){
    const total=settings.categories?.reduce((a,c)=>a+c.items.length,0)||0;
    document.getElementById('mainContent').innerHTML=`
        <div class="page-title">Panel Principal</div>
        <div class="stats-row">
            <div class="stat-box"><div class="stat-num">${total}</div><div class="stat-lbl">Endpoints</div></div>
            <div class="stat-box"><div class="stat-num">${settings.categories?.length||0}</div><div class="stat-lbl">Categorías</div></div>
            <div class="stat-box"><div class="stat-num">🟢</div><div class="stat-lbl">Online</div></div>
        </div>
        <div class="page-title" style="font-size:16px;">Endpoints disponibles</div>
        <div class="card-grid">
            ${settings.categories?.map(c=>c.items.map(i=>`
                <div class="card" onclick="abrirModal('${i.name}','${i.desc||""}','${i.path}','${c.name}','${i.innerDesc||""}')">
                    <div class="card-badge">${c.name}</div>
                    <div class="card-header"><div class="card-icon"><i class="fas fa-code"></i></div><div class="card-title">${i.name}</div></div>
                    <div class="card-desc">${i.desc||''}</div>
                    <button class="btn-probar">Probar</button>
                </div>
            `).join('')).join('')}
        </div>`;
}
function renderCategory(cat){const c=settings.categories.find(x=>x.name===cat);if(!c)return;document.getElementById('mainContent').innerHTML=`<div class="page-title">${c.name}</div><div class="card-grid">${c.items.map(i=>`<div class="card" onclick="abrirModal('${i.name}','${i.desc||""}','${i.path}','${c.name}','${i.innerDesc||""}')"><div class="card-badge">${c.name}</div><div class="card-header"><div class="card-icon"><i class="fas fa-code"></i></div><div class="card-title">${i.name}</div></div><div class="card-desc">${i.desc||''}</div><button class="btn-probar">Probar</button></div>`).join('')}</div>`;}
function renderStatus(){document.getElementById('mainContent').innerHTML=`<div class="page-title">Estado del Sistema</div><div class="card"><p>🟢 API Online</p><p>Versión: ${settings.version||'v1.0'}</p></div>`;}
function renderAll(){document.getElementById('mainContent').innerHTML=`<div class="page-title">Todos los Endpoints</div><div class="card-grid">${settings.categories?.map(c=>c.items.map(i=>`<div class="card" onclick="abrirModal('${i.name}','${i.desc||""}','${i.path}','${c.name}','${i.innerDesc||""}')"><div class="card-badge">${c.name}</div><div class="card-header"><div class="card-icon"><i class="fas fa-code"></i></div><div class="card-title">${i.name}</div></div><div class="card-desc">${i.desc||''}</div><button class="btn-probar">Probar</button></div>`).join('')).join('')}</div>`;}

function abrirModal(name,desc,path,categoria,innerDesc){
    const modal=document.getElementById('modalOverlay');
    const basePath=BASE_URL+path;
    document.getElementById('modalBox').innerHTML=`
        <h3>${name}</h3>
        <div class="badge">${categoria||'General'}</div>
        <p style="color:var(--text2);margin-bottom:8px;">${desc||''}</p>
        ${innerDesc?`<p style="color:var(--text2);font-size:12px;margin-bottom:8px;white-space:pre-wrap;">${innerDesc}</p>`:''}
        <div class="live-url" id="liveUrl">${basePath}</div>
        <input type="text" id="modalParam" class="inp" placeholder="Escribe el parámetro aquí..." oninput="actualizarURL('${basePath}')">
        <button class="btn btn-primary" style="width:100%;margin-top:8px;" onclick="probar('${basePath}')">Enviar solicitud</button>
        <div class="response" id="modalResponse">Esperando...</div>
    `;
    modal.classList.add('show');
}
function actualizarURL(base){
    const param=document.getElementById('modalParam')?.value||'';
    const sep=base.includes('?')?'&':'?';
    document.getElementById('liveUrl').textContent=param?base+sep+param:base;
}
async function probar(base){
    const param=document.getElementById('modalParam')?.value||'';
    const respEl=document.getElementById('modalResponse');
    respEl.textContent='Cargando...';
    try{
        const sep=base.includes('?')?'&':'?';
        const url=param?base+sep+encodeURIComponent(param):base;
        const r=await fetch(url);const d=await r.json();
        respEl.textContent=JSON.stringify(d,null,2);
    }catch(e){respEl.textContent='Error: '+e.message;}
}

renderAuth();
</script>
</body>
</html>
